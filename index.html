/* Validar campos y fotos requeridos por sección antes de completar */
function _validateLevSec(ot,secNum){
  var h=ot.h3||{};
  var otId=ot.id;
  var errors=[];
  var reqFoto=function(sec,label){
    if(getEvid(otId,sec).length===0) errors.push('Falta al menos 1 foto: '+label);
  };
  var reqField=function(val,label){
    if(!val||!String(val).trim()) errors.push('Campo requerido: '+label);
  };
  switch(String(secNum)){
    case '1':
      reqFoto('comunicacion_so','Foto SO / Novedad');
      break;
    case '2':{
      const ts2=h.transportes||[];
      if(ts2.length===0){
        errors.push('Campo requerido: Tipo de transporte');
        errors.push('Falta al menos 1 foto: Foto transporte');
      } else {
        const t0=ts2[0];
        reqField(t0.desc,'Tipo de transporte');
        reqFoto('tp_'+t0.id+'_tipo','Foto transporte');
        reqFoto('tp_'+t0.id+'_vid','Video del recorrido D');
        reqFoto('tp_'+t0.id+'_pB','Punto B E');
      }
      break;
    }
    case '3':
      reqFoto('ingreso_puerta','Foto portón / puerta abierta');
      break;
    case '4':
      reqFoto('poda_ext_A','Foto vegetación cara frontal');
      break;
    case '5':
      reqFoto('cerr_ext_A','Foto cerramiento cara frontal');
      break;
    case '6':
      reqFoto('porton_fuera','Foto portón por fuera');
      reqFoto('porton_llaves','Foto llaves de la estación');
      break;
    case '7':
      if(h.placa_concreto?.solicita==='si'){
        reqFoto('placa_foto','Foto estado actual del piso');
      } else {
        reqFoto('placa_no_foto','Foto evidencia (sin placa)');
      }
      break;
    case '8':
      reqFoto('conc_ext_A','Foto concertina cara frontal');
      break;
    case '9':
      // Reflectores: al menos 1 foto del primer reflector si hay
      if((h.reflectores||[]).length>0){
        var r0=h.reflectores[0];
        reqFoto('refl_'+r0.id+'_foto','Foto reflector 1');
      }
      break;
    case '10':{
      var nCto=parseInt(h.cuartos_count||0);
      if(nCto===0){
        reqFoto('cuartos_no_foto','Foto evidencia (sin cuartos)');
      } else {
        reqFoto('cto_0_p0_fdentro','Foto puerta cuarto 1 por dentro');
      }
      break;
    }
    case '11':
      if(h.shelter_hay==='si'){
        reqFoto('shl_0_ext_A','Foto shelter cara frontal');
      } else {
        reqFoto('shelter_no_foto','Foto evidencia (sin shelter)');
      }
      break;
    case '12':
      if(h.planta_hay==='si'){
        reqFoto('planta_f1','Foto planta eléctrica cara frontal');
      } else {
        reqFoto('planta_no_foto','Foto evidencia (sin planta)');
      }
      break;
    case '13':
      reqFoto('placa_equipo_A','Foto placa de equipos');
      break;
    case '14':
      reqFoto('lv_sI','Foto soporte inferior línea de vida');
      reqField(h.lv_vigente,'Estado de vigencia de la línea de vida');
      break;
    case '15':
      reqFoto('cc_abierta','Foto caja de control abierta');
      break;
    case '16':
      reqFoto('plano_foto','Foto plano mano alzada');
      break;
    case '18':
      if(h.bateria_enc==='si'){
        var bats=h.baterias_ent||[];
        if(bats.length>0){
          reqFoto('bt_'+bats[0].id+'_foto','Foto batería 1');
        }
      } else {
        reqFoto('bat_no_foto','Foto evidencia (sin encoframiento)');
      }
      break;
    case 'C':
      reqFoto('cub_imp_exist','Foto impermeabilización existente');
      reqFoto('cub_plano','Foto plano cubierta');
      break;
  }
  return errors;
}

  var onch=sub?'upSpinner(\''+sub+'\',\''+key+'\',this.value)':'s3f(\''+key+'\',this.value);rp(3)';

    +'<div style="display:flex;align-items:center;gap:0;background:var(--ink3);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;overflow:hidden;width:fit-content;min-width:130px">'
    +'<button type="button" onclick="var i=document.getElementById(\''+id+'\');i.value=Math.max('+min+',parseInt(i.value||0)-1);i.dispatchEvent(new Event(\'change\'))" style="background:rgba(255,255,255,.06);border:none;color:var(--white);font-size:1.1rem;width:36px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">−</button>'
    +'<input id="'+id+'" type="number" min="'+min+'" value="'+((val)||min)+'" '+(L?'readonly':'')+' onchange="'+onch+'" style="width:50px;text-align:center;background:transparent;border:none;color:var(--white);font-size:.95rem;font-weight:700;padding:0;outline:none;-moz-appearance:textfield">'
    +'<button type="button" onclick="var i=document.getElementById(\''+id+'\');i.value=parseInt(i.value||0)+1;i.dispatchEvent(new Event(\'change\'))" style="background:rgba(255,255,255,.06);border:none;color:var(--white);font-size:1.1rem;width:36px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">+</button>'
    +'</div></div>';
}
function upSpinner(sub,key,val){s3k(sub,key,val);rp(3);}

function toggleOutdoor(){
  document.body.classList.toggle('outdoor');
  try{localStorage.setItem('toc_outdoor',document.body.classList.contains('outdoor')?'1':'0');}catch(e){}
}



function _ss(tit,body){
  return '<div style="background:rgba(0,229,195,.04);border:1px solid rgba(0,229,195,.12);border-radius:8px;padding:12px;margin:10px 0">'

}

function _yn(label,key,val,L,extra){
  return '<div class="fg" style="display:flex;align-items:center;gap:10px"><label style="margin-bottom:0">'+label+'</label>'
    +'<select style="width:auto;margin-left:8px" '+(L?'disabled':'')+' onchange="s3f(\''+key+'\',this.value)'+(extra?';'+extra:'')+'">'
    +'<option value="no"'+((!val||val==='no')?' selected':'')+'>No</option>'
    +'<option value="si"'+(val==='si'?' selected':'')+'>Sí</option>'
    +'</select></div>';
}

function _tf(label,key,sub,val,L,ph){
  var onch = sub ? 'onchange="s3k(\''+sub+'\',\''+key+'\',this.value)"' : 'onchange="s3f(\''+key+'\',this.value)"';
  return '<div class="fg"><label>'+label+'</label><textarea rows="2" '+(L?'readonly':'')+' '+onch+' placeholder="'+(ph||'')+'">'+((val)||'')+'</textarea></div>';
}

function _nf(label,key,sub,val,L){
  var onch = sub ? 'onchange="s3k(\''+sub+'\',\''+key+'\',this.value)"' : 'onchange="s3f(\''+key+'\',this.value)"';
  return '<div class="fg"><label>'+label+'</label><input type="number" step="0.01" value="'+((val)||'')+'" '+(L?'readonly':'')+' '+onch+'></div>';
}

function _meds(sub,d,L,campos){
  if(!campos) campos=['largo','ancho'];
  var MAP={largo:'Largo(m)',ancho:'Ancho(m)',alto:'Alto(m)',area:'Área(m²)'};
  return '<div class="fr3">'+campos.map(function(c){
    return '<div class="fg"><label>'+(MAP[c]||c)+'</label><input type="number" step="0.01" value="'+((d&&d[c])||'')+'" '+(L?'readonly':'')+' onchange="s3k(\''+sub+'\',\''+c+'\',this.value)"></div>';
  }).join('')+'</div>';
}
function addGarFila(otId,itemIdx){
  const ot=getOT(otId);if(!ot)return;
  const item=ot.garantia?.items?.[itemIdx];if(!item)return;
  item.filas=item.filas||[];
  item.filas.push({id:Date.now(),ubic:'',cant:'',largo:'',ancho:'',alto:'',obs:'',refImg:''});
  save();panelGarantiaItems(otId);
}
function delGarFila(otId,itemIdx,filaIdx){
  const ot=getOT(otId);if(!ot)return;
  ot.garantia.items[itemIdx].filas.splice(filaIdx,1);save();panelGarantiaItems(otId);
}
function upGarFila(otId,itemIdx,filaIdx,field,val){
  const ot=getOT(otId);if(!ot)return;
  const item=ot.garantia.items[itemIdx];if(!item)return;
  item.filas=item.filas||[];
  item.filas[filaIdx]=item.filas[filaIdx]||{};
  item.filas[filaIdx][field]=val;save();
}
/* Actualiza nombre o código de un ítem de garantía (solo tabasco puede llamar esto) */
function upGarItemField(otId,itemIdx,field,val){
  const ot=getOT(otId);if(!ot)return;
  const u=STATE.currentUser;
  if(!u||u.rol!=='tabasco'){showToast('🔒 Solo Tabasco puede editar este campo','warn');return;}
  ot.garantia=ot.garantia||{};
  ot.garantia.items=ot.garantia.items||[];
  const item=ot.garantia.items[itemIdx];if(!item)return;
  item[field]=val;
  save();
}
window.loadRefImgGar = async function(evt, otId, itemIdx) {
  const file = evt.target.files?.[0];
  if (!file) return;

  // Subir a Firebase
  const url = await subirFoto(file);

  const ot = getOT(otId);
  if (!ot) return;

  const item = ot.garantia?.items?.[itemIdx];
  if (!item) return;

  item.refImg = url;

  save();
  panelGarantiaItems(otId);
}

if ('serviceWorker' in navigator) {

<script>
// ═══════════════════════════════════════════════════════════
// FIREBASE + FIRESTORE SYNC (compat) — TOC MTTO Field App
// Real-time: onSnapshot en "estado/global"
// ═══════════════════════════════════════════════════════════

const firebaseConfig = {
  apiKey:            "AIzaSyCzgyshs_VEvt08-xgVyYVnSkoeTYKLXk",
  authDomain:        "toc-field-app-c2695.firebaseapp.com",
  projectId:         "toc-field-app-c2695",
  storageBucket:     "toc-field-app-c2695.firebasestorage.app",
  messagingSenderId: "344071269176",
  appId:             "1:344071269176:web:ed07dbc555b0dda4d7afcd",
  measurementId:     "G-RBCJ2DWN5B"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db      = firebase.firestore();
const storage = firebase.storage();

// ── Helper: data URL → Blob (evita putString que falla en mobile)
function _dataUrlToBlob(dataUrl){
  return fetch(dataUrl).then(r=>r.blob());
}

// ── Subir archivo File (foto original desde garantía, etc.)
window.subirFoto = async function(file){
  const nombre = Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const r      = storage.ref('fotos/'+nombre);
  const snap   = await r.put(file);
  return snap.ref.getDownloadURL();
};

// ── Subir imagen watermarked en base64 (cámara/galería → imágenes)
window.subirBase64 = async function(dataUrl, nombre){
  const blob = await _dataUrlToBlob(dataUrl);
  const r    = storage.ref('evidencias/'+Date.now()+'_'+(nombre||'foto.jpg'));
  const snap = await r.put(blob);
  return snap.ref.getDownloadURL();
};

// ── Subir video original en base64 (cámara → videos)
window.subirVideo = async function(dataUrl, nombre){
  const blob = await _dataUrlToBlob(dataUrl);
  const r    = storage.ref('videos/'+Date.now()+'_'+(nombre||'video.mp4'));
  const snap = await r.put(blob);
  return snap.ref.getDownloadURL();
};

// ── Helper: eliminar base64 antes de escribir en Firestore
function _stripB64(obj){
  if(!obj||typeof obj!=='object') return;
  for(const k of Object.keys(obj)){
    if(typeof obj[k]==='string'&&obj[k].startsWith('data:')){
      obj[k]='';
    } else {
      _stripB64(obj[k]);
    }
  }
}

// ── fbSaveEstado: guarda STATE.ots + STATE.evidencias → "estado/global"
window.fbSaveEstado = async function(){
  try{
    // OTs: copia limpia sin base64
    const otsClean = JSON.parse(JSON.stringify(STATE.ots||[]));
    _stripB64(otsClean);

    // Evidencias: solo conservar las que tienen URL remota
    const evClean = {};
    for(const [k,arr] of Object.entries(STATE.evidencias||{})){
      const limpio = (arr||[]).map(f=>({
        name:  f.name  ||'',
        type:  f.type  ||'',
        phase: f.phase ||'',
        url:   f.url   ||''
      })).filter(f=>f.url);
      if(limpio.length) evClean[k]=limpio;
    }

    await db.collection('estado').doc('global').set({
      ots:       otsClean,
      evidencias: evClean,
      updatedAt: Date.now()
    });
    if(typeof _showSyncDot==='function') _showSyncDot(true);
  }catch(e){
    console.warn('fbSaveEstado error:',e);
    if(typeof _showSyncDot==='function') _showSyncDot(false);
  }
};

// ── onSnapshot: escucha "estado/global" → actualiza STATE y rerenderiza
var _snapTimer;
db.collection('estado').doc('global').onSnapshot(
  { includeMetadataChanges: true },
  function(snap){
    if(STATE.currentView==='notifDrill') return;
    clearTimeout(_snapTimer);
    _snapTimer=setTimeout(function(){
    // Ignorar escrituras pendientes propias (evita loop)
    if(!snap.exists || snap.metadata.hasPendingWrites) return;
    const data = snap.data();
    if(!data) return;

    window._skipFbSave = true;
    if(Array.isArray(data.ots))       STATE.ots        = data.ots;
    if(data.evidencias !== undefined) STATE.evidencias = data.evidencias||{};

    // Mantener localStorage sincronizado
    try{
      localStorage.setItem(LS_KEY, JSON.stringify({
        notifs:             STATE.notifs             ||[],
        contratistas:       STATE.contratistas       ||[],
        ots:                STATE.ots,
        solicitudesUsuario: STATE.solicitudesUsuario ||[]
      }));
      localStorage.setItem(LS_EV, JSON.stringify(STATE.evidencias));
    }catch(e){}

    window._skipFbSave = false;

    // Re-renderizar la vista actual (funciona desde cualquier pantalla)
    if(typeof rp==='function' && typeof curOT==='function' && curOT()){
      rp(STATE.tab);  // dentro de una OT → re-renderizar tab activo
    } else if(typeof routeByRole==='function' && STATE.currentUser){
      routeByRole();  // en dashboard/lista → re-renderizar vista completa
    }
    },800); // fin debounce _snapTimer
  },
  function(err){ console.warn('onSnapshot error:',err); }
);

// ── fbSave: guarda configuración general + OTs (colecciones legacy)
window.fbSave = async function(data){
  const ots   = data.ots   || [];
  const users = data.users || [];

  await db.collection('toc_config').doc('main').set({
    notifs:             data.notifs             ||[],
    contratistas:       data.contratistas       ||[],
    solicitudesUsuario: data.solicitudesUsuario ||[],
    catalog:            data.catalog            ||[],
    catalogGar:         data.catalogGar         ||[],
    eppCatalog:         data.eppCatalog         ||[],
    users:              users,
    updatedAt:          Date.now()
  });

  const batch = db.batch();
  ots.forEach(ot=>{
    const ref    = db.collection('toc_ots').doc(String(ot.id));
    const otClean = JSON.parse(JSON.stringify(ot));
    _stripB64(otClean);
    batch.set(ref, otClean);
  });
  await batch.commit();
};

// ── fbLoad: carga configuración general + OTs desde colecciones legacy
window.fbLoad = async function(){
  const cfgSnap = await db.collection('toc_config').doc('main').get();
  const cfg = cfgSnap.exists ? cfgSnap.data() : {};

  const otsSnap = await db.collection('toc_ots').get();
  const ots = [];
  otsSnap.forEach(d=>ots.push(d.data()));

  return {
    notifs:             cfg.notifs             ||[],
    contratistas:       cfg.contratistas       ||[],
    solicitudesUsuario: cfg.solicitudesUsuario ||[],
    catalog:            cfg.catalog            ||[],
    catalogGar:         cfg.catalogGar         ||[],
    eppCatalog:         cfg.eppCatalog         ||[],
    users:              cfg.users              ||[],
    ots
  };
};

// ── fbSaveEvidencias: guarda evidencias (solo URLs) en colección legacy
window.fbSaveEvidencias = async function(evidencias){
  const clean = {};
  for(const [k,arr] of Object.entries(evidencias||{})){
    const fil = (arr||[]).map(f=>({
      name:  f.name  ||'',
      type:  f.type  ||'',
      phase: f.phase ||'',
      url:   f.url   ||''
    })).filter(f=>f.url);
    if(fil.length) clean[k]=fil;
  }
  if(!Object.keys(clean).length) return;
  await db.collection('toc_evidencias').doc('main').set({
    data: clean, updatedAt: Date.now()
  });
};

// ── fbLoadEvidencias: carga evidencias desde colección legacy
window.fbLoadEvidencias = async function(){
  try{
    const snap = await db.collection('toc_evidencias').doc('main').get();
    if(!snap.exists) return {};
    return snap.data().data||{};
  }catch(e){ return {}; }
};

console.log('🔥 Firebase Firestore compat + onSnapshot(estado/global) activo');
// ── App wake/unlock handler: re-render on visibility restore ──
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'visible'){
    setTimeout(function(){
      if(STATE && STATE.currentUser){
        try{
          if(typeof rp==='function' && STATE.tab && typeof curOT==='function' && curOT()){
            rp(STATE.tab);
          } else if(typeof routeByRole==='function'){
            routeByRole();
          }
        }catch(e){}
      }
    }, 250);
  }
});
window.addEventListener('pageshow', function(e){
  if(e.persisted){
    setTimeout(function(){
      if(STATE && STATE.currentUser && typeof routeByRole==='function'){
        routeByRole();
      }
    }, 300);
  }
});

</script>
