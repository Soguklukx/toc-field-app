<link id="mf-link" rel="manifest">
<script>
// Generar manifest inline para PWA (instalación en móvil y escritorio)
(function(){
  const manifest={
    name:'TOC MTTO Field App',
    short_name:'TOC Field',
    description:'Sistema de Gestión de OTs para TOC MTTO',
    start_url:'./',
    display:'standalone',
    background_color:'#0A1628',
    theme_color:'#00E5C3',
    orientation:'portrait-primary',
    icons:[
      {src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="24" fill="%230A1628"/><text x="96" y="130" font-size="110" text-anchor="middle" fill="%2300E5C3">⚡</text></svg>',sizes:'192x192',type:'image/svg+xml',purpose:'any maskable'},
      {src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="64" fill="%230A1628"/><text x="256" y="340" font-size="290" text-anchor="middle" fill="%2300E5C3">⚡</text></svg>',sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'}
    ]
  };
  try{
    const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
    document.getElementById('mf-link').href=URL.createObjectURL(blob);
  }catch(e){}
})();

// Service Worker inline para caché offline
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='toc-mtto-v15';
    const ASSETS=[];
    self.addEventListener('install',e=>{self.skipWaiting();});
    self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))))});
    self.addEventListener('fetch',e=>{
      if(e.request.method!=='GET')return;
      e.respondWith(fetch(e.request).then(r=>{
        const rc=r.clone();
        caches.open(CACHE).then(c=>c.put(e.request,rc));
        return r;
      }).catch(()=>caches.match(e.request)));
    });
  `;
  try{
    const swBlob=new Blob([swCode],{type:'application/javascript'});
    const swUrl=URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl,{scope:'./'}).catch(()=>{});
  }catch(e){}
}
</script>

<style>
/* ================================================================
   Tabasco OC LLC
   Roles: tabasco | admin | tecnico
   Diseño: dark industrial-tech, Syne + JetBrains Mono
   ================================================================ */
:root{
  --ink:#0A1628;--ink2:#0F1E35;--ink3:#1A2F4A;--ink4:#243750;
  --cyan:#00E5C3;--cyan2:#00C4A8;--orange:#FF7240;--gold:#FFB627;
  --white:#F0F4F8;--g1:#C8D6E5;--g2:#8FA3B8;--g3:#4A6278;
  --ok:#1DDA7A;--warn:#FFB627;--red:#FF4D5E;--purple:#9B59B6;
  /* Semáforo */
  --sem-ok:#1DDA7A;--sem-warn:#FFB627;--sem-risk:#FF7240;--sem-venc:#FF4D5E;
  --r:10px;--sh:0 6px 28px rgba(0,0,0,.45);--t:all .18s ease;
}
/* ── Modo outdoor / alto contraste ── */
body.outdoor{
  --ink:#FFFFFF;--ink2:#E8F0F8;--ink3:#D0DCE8;--ink4:#B0C4D8;
  --white:#000000;--g1:#0A1628;--g2:#0F2040;--g3:#1A3050;
  --cyan:#0055AA;--cyan2:#004499;--orange:#CC4400;--gold:#AA7700;
  --ok:#006633;--warn:#885500;--red:#CC0011;--border:rgba(0,0,0,.25);
}
body.outdoor input,body.outdoor select,body.outdoor textarea{background:#E8F0F8;border-color:rgba(0,0,0,.3);color:#000}
body.outdoor input:focus,body.outdoor select:focus,body.outdoor textarea:focus{border-color:#0055AA;box-shadow:0 0 0 3px rgba(0,85,170,.18)}
body.outdoor .card{background:#EFF4FA;border-color:rgba(0,0,0,.18)}
body.outdoor .navbar{background:#D0DCE8;border-bottom-color:rgba(0,85,170,.4)}
body.outdoor .st{color:#0055AA;border-bottom-color:rgba(0,85,170,.25)}
body.outdoor .btn{background:#0055AA;color:#fff}
body.outdoor .btn.bd{background:transparent;border-color:#0055AA;color:#0055AA}
body.outdoor select option{background:#E8F0F8;color:#000}
/* Fix #10 – alertas en modo outdoor */
body.outdoor .a-i{background:rgba(0,85,170,.12);border-left-color:#0055AA;color:#000}
body.outdoor .a-w{background:rgba(170,119,0,.12);border-left-color:#AA7700;color:#000}
body.outdoor .a-e{background:rgba(204,0,17,.12);border-left-color:#CC0011;color:#000}
body.outdoor .a-s{background:rgba(0,102,51,.12);border-left-color:#006633;color:#000}
#btnOutdoor{transition:var(--t)}
body.outdoor #btnOutdoor{background:rgba(0,85,170,.15);border-radius:6px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
body{font-family:'Syne',sans-serif;background:var(--ink);color:var(--white);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--ink2)}::-webkit-scrollbar-thumb{background:var(--ink4);border-radius:2px}
h2{font-size:1.2rem;font-weight:700;letter-spacing:-.01em}
h3{font-size:.92rem;font-weight:600;color:var(--cyan)}
label{font-size:.8rem;font-weight:500;color:var(--g2);display:block;margin-bottom:4px}
.mono{font-family:'JetBrains Mono',monospace}
input,select,textarea{width:100%;padding:10px 14px;background:var(--ink3);border:1.5px solid rgba(255,255,255,.08);border-radius:var(--r);color:var(--white);font-family:'Syne',sans-serif;font-size:.88rem;transition:var(--t);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,229,195,.12)}
input[readonly],input:disabled,select:disabled{background:rgba(255,255,255,.03);color:var(--g3);cursor:not-allowed;border-color:rgba(255,255,255,.04)}
select option{background:var(--ink3)}
textarea{resize:vertical;min-height:70px}
input[type="file"]{padding:8px;cursor:pointer}
input[type="file"]::-webkit-file-upload-button{background:var(--cyan2);color:var(--ink);border:none;padding:6px 14px;border-radius:7px;cursor:pointer;font-weight:700;font-family:'Syne',sans-serif;margin-right:10px;font-size:.8rem}
input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type="number"]{-moz-appearance:textfield}
input[type="checkbox"]{width:auto;accent-color:var(--cyan)}
/* ── BOTONES ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--r);border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;transition:var(--t)}
.bc{background:var(--cyan);color:var(--ink)}.bc:hover{background:var(--cyan2);transform:translateY(-1px)}
.bs{background:var(--ink3);color:var(--white);border:1.5px solid rgba(255,255,255,.12)}.bs:hover{border-color:var(--cyan)}
.bd{background:var(--red);color:#fff}.bw{background:var(--gold);color:var(--ink)}
.bg{background:var(--ok);color:var(--ink)}.bo{background:var(--orange);color:#fff}
.bp{background:var(--purple);color:#fff}
.btn:disabled{opacity:.38;cursor:not-allowed;transform:none!important}
.sm{padding:6px 13px;font-size:.77rem}.full{width:100%;justify-content:center}
/* ── LAYOUT ── */
.fg{margin-bottom:14px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:460px){.fr,.fr3{grid-template-columns:1fr}}
.card{background:var(--ink2);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid rgba(255,255,255,.07)}
.card-glow{border-color:rgba(0,229,195,.2);background:rgba(0,229,195,.04)}
.card-warn{border-color:rgba(255,182,39,.2);background:rgba(255,182,39,.04)}
.card-gar{border-color:rgba(155,89,182,.25);background:rgba(155,89,182,.04)}
/* ── BADGES ── */
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.68rem;font-weight:700}
.bok{background:rgba(29,218,122,.18);color:var(--ok)}
.bwn{background:rgba(255,182,39,.18);color:var(--gold)}
.brj{background:rgba(255,77,94,.18);color:var(--red)}
.bin{background:rgba(0,229,195,.18);color:var(--cyan)}
.bor{background:rgba(255,114,64,.18);color:var(--orange)}
.bpu{background:rgba(155,89,182,.18);color:var(--purple)}
/* ── SEMÁFORO ── */
.sem-ok{color:var(--sem-ok)}.sem-warn{color:var(--sem-warn)}.sem-risk{color:var(--sem-risk)}.sem-venc{color:var(--sem-venc)}
.sem-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700}
.sem-badge-ok{background:rgba(29,218,122,.15);color:var(--ok)}
.sem-badge-warn{background:rgba(255,182,39,.15);color:var(--gold)}
.sem-badge-risk{background:rgba(255,114,64,.15);color:var(--orange)}
.sem-badge-venc{background:rgba(255,77,94,.15);color:var(--red)}
/* ── HEADER ── */
#hdr{background:var(--ink2);border-bottom:1px solid rgba(0,229,195,.15);padding:10px 16px;display:flex;align-items:center;gap:11px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.5)}
.logo{width:38px;height:38px;background:linear-gradient(135deg,var(--cyan),var(--orange));border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.88rem;color:var(--ink);flex-shrink:0}
.logo-txt span:first-child{font-size:.85rem;font-weight:700}
.logo-txt span:last-child{font-size:.6rem;color:var(--cyan);display:block}
.hpt{flex:1;font-size:.85rem;font-weight:600}
.nb{background:none;border:none;color:var(--g2);font-size:1.2rem;cursor:pointer;padding:5px;position:relative}
.nbdg{position:absolute;top:1px;right:1px;background:var(--red);color:#fff;font-size:.56rem;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.uc{background:var(--ink3);border-radius:20px;padding:4px 10px 4px 5px;display:flex;align-items:center;gap:6px;font-size:.75rem}
.ua{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--orange));display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:var(--ink)}
/* ── TABS ── */
#tabs{display:flex;background:var(--ink2);border-bottom:1px solid rgba(255,255,255,.06);overflow-x:auto;scrollbar-width:none;position:sticky;top:60px;z-index:99}
#tabs::-webkit-scrollbar{display:none}
.tb{flex:1 0 auto;min-width:50px;padding:9px 11px;background:none;border:none;color:var(--g3);font-family:'Syne',sans-serif;font-size:.72rem;font-weight:500;cursor:pointer;border-bottom:2.5px solid transparent;transition:var(--t);white-space:nowrap}
.tb:hover:not(.lk){color:var(--g1)}.tb.active{color:var(--cyan);border-bottom-color:var(--cyan);font-weight:700}
.tb.lk{opacity:.35;cursor:not-allowed}.tb.done{color:var(--ok)}.tb.done::after{content:' ✓';font-size:.66rem}
/* ── PROGRESS ── */
#pb-bar{background:var(--ink2);padding:7px 16px;border-bottom:1px solid rgba(255,255,255,.05);position:sticky;top:99px;z-index:98}
.pl{font-size:.68rem;color:var(--g3);margin-bottom:3px}
.pb{height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--cyan),var(--orange));border-radius:2px;transition:width .5s ease}
/* ── CONTENT ── */
#content{max-width:720px;margin:0 auto;padding:18px 14px 100px}
.st{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--cyan);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.st::after{content:'';flex:1;height:1px;background:rgba(0,229,195,.18)}
.sn{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--cyan);color:var(--ink);font-weight:700;font-size:.8rem;flex-shrink:0}
/* ── ALERTS ── */
.alert{padding:10px 14px;border-radius:var(--r);margin-bottom:12px;font-size:.82rem;display:flex;align-items:flex-start;gap:8px;line-height:1.45}
.a-i{background:rgba(0,229,195,.08);border-left:3px solid var(--cyan)}
.a-w{background:rgba(255,182,39,.08);border-left:3px solid var(--gold)}
.a-e{background:rgba(255,77,94,.08);border-left:3px solid var(--red)}
.a-s{background:rgba(29,218,122,.08);border-left:3px solid var(--ok)}
.a-o{background:rgba(255,114,64,.08);border-left:3px solid var(--orange)}
.a-p{background:rgba(155,89,182,.08);border-left:3px solid var(--purple)}
.v-err{font-size:.76rem;color:var(--red);margin-top:4px;display:flex;align-items:center;gap:4px}
.v-err::before{content:'⚠'}
/* ── TIPS ── */
.tip-wrap{position:relative;display:inline-flex;align-items:center;gap:5px;margin-bottom:4px;width:100%}
.tip-wrap label{margin-bottom:0;flex:1}
.tip-btn{background:none;border:1.5px solid var(--g3);color:var(--g2);border-radius:50%;width:17px;height:17px;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--t)}
.tip-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.tip-box{position:absolute;bottom:calc(100% + 6px);left:0;background:var(--ink4);border:1px solid rgba(0,229,195,.25);color:var(--g1);padding:8px 12px;border-radius:8px;font-size:.74rem;white-space:pre-wrap;max-width:300px;z-index:200;box-shadow:var(--sh);line-height:1.5;display:none}
.tip-box.show{display:block}
/* ── PREVIEWS ── */
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:7px;margin-top:7px}
.pi{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:var(--ink3);cursor:pointer}
.pi img{width:100%;height:100%;object-fit:cover}
.pdl{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.7rem;z-index:2}
.pi-chk{position:absolute;top:3px;left:3px;width:16px;height:16px;accent-color:var(--cyan);z-index:2}
.wl{position:absolute;bottom:3px;left:3px;background:rgba(0,0,0,.72);color:#fff;font-size:.48rem;padding:1px 4px;border-radius:3px;max-width:85%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pi-view{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:background .15s;pointer-events:none}
.pi:hover .pi-view{background:rgba(0,0,0,.38)}
.pi-view::after{content:'🔍';font-size:1.2rem;opacity:0;transition:opacity .15s}
.pi:hover .pi-view::after{opacity:1}
/* ── REF IMAGE para ítems ── */
.ref-img-prev{width:70px;height:70px;object-fit:cover;border-radius:8px;border:1.5px solid rgba(0,229,195,.3);cursor:pointer}
.ref-img-placeholder{width:70px;height:70px;background:var(--ink3);border-radius:8px;border:1.5px dashed rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--g3);flex-shrink:0;text-align:center}
/* ── READONLY ── */
.locked-banner{background:rgba(255,77,94,.08);border:1px solid rgba(255,77,94,.2);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:.82rem;color:var(--red);display:flex;align-items:center;gap:8px}
/* ── DYNAMIC ENTRIES ── */
.dyn{background:var(--ink2);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);padding:14px;margin-bottom:10px}
.dyn-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.06)}
/* ── SI/NO ── */
.no-en-sitio{background:rgba(255,77,94,.06);border:1px solid rgba(255,77,94,.15);border-radius:var(--r);padding:10px 14px;margin:8px 0;font-size:.82rem;color:var(--g2);display:flex;align-items:center;gap:8px}
.no-en-sitio::before{content:'📋';flex-shrink:0}
.si-req-wrap{background:rgba(0,229,195,.04);border:1px solid rgba(0,229,195,.15);border-radius:var(--r);padding:12px;margin-top:8px}
/* ── MODAL ── */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;padding:16px}
.mo.open{display:flex}
.mb{background:var(--ink2);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:24px;width:100%;max-width:480px;box-shadow:var(--sh);max-height:90vh;overflow-y:auto}
.mb h2{margin-bottom:16px}
/* ── Contrast fixes: modals, alerts, approved items ── */
.mb { background: var(--ink2); color: var(--white); }
.mb h2, .mb h3 { color: var(--white); }
.mb label { color: var(--g1); }
.mb .ro-field { color: var(--g1); background: rgba(255,255,255,.06); }
/* Approved items in H4 – ensure text visible */
.item-aprobado { background: var(--ink2); border: 1px solid rgba(255,255,255,.1); color: var(--white); }
.item-aprobado label { color: var(--g1); }
/* Alert text always readable */
.alert { color: var(--g1); }
.a-i, .a-w, .a-e, .a-s, .a-o, .a-p { color: var(--white); }
/* dyn cards – force text visible */
.dyn { color: var(--white); }
.dyn label { color: var(--g1); }
/* Stat cards and badges force readable */
.stat-card { color: var(--white); }

/* ── LIGHTBOX ── */
#lbx{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:2000;flex-direction:column;align-items:center;justify-content:center;padding:16px}
#lbx.open{display:flex}
#lbx img{max-width:100%;max-height:72vh;border-radius:8px;object-fit:contain}
#lbx-cap{color:var(--g2);font-size:.76rem;margin-top:8px;text-align:center}
#lbx-btns{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;justify-content:center}
#lbx-prev:hover,#lbx-next:hover{background:rgba(0,229,195,.25)!important;}
/* ── NOTIF CENTER ── */
#nc{position:fixed;top:60px;right:0;width:320px;max-height:70vh;background:var(--ink2);border:1px solid rgba(255,255,255,.1);border-radius:0 0 0 12px;box-shadow:var(--sh);overflow-y:auto;z-index:200;display:none;padding:12px}
#nc.open{display:block}
.ni{padding:9px;border-radius:7px;background:var(--ink3);margin-bottom:6px;font-size:.76rem;border-left:3px solid var(--cyan);cursor:pointer;transition:var(--t)}
.ni:hover{border-left-color:var(--orange);background:var(--ink4)}
.ni.unread{border-left-color:var(--orange)}
.nm{font-size:.64rem;color:var(--g3);margin-top:3px}
/* ── LOGIN ── */
#ls{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,#0D2240 0%,var(--ink) 70%);display:flex;align-items:center;justify-content:center;padding:20px;z-index:3000}
.lc{background:var(--ink2);border:1px solid rgba(0,229,195,.2);border-radius:16px;padding:30px 26px;width:100%;max-width:360px;box-shadow:var(--sh)}
.ll{text-align:center;margin-bottom:24px}
.ll .logo{width:56px;height:56px;font-size:1.25rem;margin:0 auto 12px}
.ll h1{color:var(--cyan);font-size:1.25rem;font-weight:800}
.ll p{color:var(--g3);font-size:.78rem;margin-top:4px}
/* ── DASHBOARD ── */
.db-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}

/* ═══════════════════════════════════════════════════════════
   SISTEMA DE EVIDENCIAS
   Almacenado en STATE.evidencias (key = otId__campo)
   ═══════════════════════════════════════════════════════════ */
function _evKey(otId, sec){ return `${otId}__${sec}`; }

function getEvid(otId, sec){
  return (STATE.evidencias[_evKey(otId,sec)] || []);
}

function addEvid(otId, sec, fd){
  const k=_evKey(otId,sec);
  if(!STATE.evidencias[k]) STATE.evidencias[k]=[];
  STATE.evidencias[k].push(fd);
  saveEvidencias();
}

function delEvid(otId, sec, idx){
  const k=_evKey(otId,sec);
  if(STATE.evidencias[k]) STATE.evidencias[k].splice(idx,1);
  saveEvidencias();
}

function saveEvidencias(){
  try{ localStorage.setItem(LS_EV, JSON.stringify(STATE.evidencias)); }catch(e){}
  if(window.fbSaveEvidencias && !window._skipFbSave){
    window.fbSaveEvidencias(STATE.evidencias).catch(e=>console.warn('Ev sync:',e));
  }
  // Sync real-time: actualizar estado/global
  if(window.fbSaveEstado && !window._skipFbSave){
    window.fbSaveEstado().catch(e=>console.warn('fbSaveEstado (ev):',e));
  }
}

async function wmAdd(src, meta){
  return new Promise(res=>{
    const img=new Image(); img.onload=function(){
      const c=document.getElementById('wmc'); c.width=img.width; c.height=img.height;
      const ctx=c.getContext('2d'); ctx.drawImage(img,0,0);
      const bH=Math.max(40,img.height*0.10);
      ctx.fillStyle='rgba(0,0,0,.76)'; ctx.fillRect(0,img.height-bH,img.width,bH);
      const fS=Math.max(11,img.width*WATERMARK_FONT_SCALE);
      ctx.fillStyle='#00E5C3'; ctx.font=`bold ${fS}px JetBrains Mono,monospace`; ctx.textBaseline='bottom';
      ctx.fillText(`${meta.fecha} | ${meta.est} | ${meta.ot}`, 7, img.height-bH/2-2, img.width-14);
      ctx.fillStyle='rgba(255,255,255,.85)'; ctx.font=`${Math.max(9,fS*0.78)}px JetBrains Mono,monospace`;
      ctx.fillText(`GPS: ${meta.coords}`, 7, img.height-4, img.width-14);
      res(c.toDataURL('image/jpeg',.82));
    }; img.src=src;
  });
}

async function wmVid(src, meta){
  // Mobile-compatible video thumbnail + watermark — uses max native resolution
  return new Promise(res=>{
    const v=document.createElement('video');
    v.muted=true; v.playsInline=true; v.preload='auto';
    v.style.cssText='position:absolute;left:-9999px;width:320px;height:240px;opacity:0';
    document.body.appendChild(v);
    let captured=false;

    const cleanup=()=>{ try{document.body.removeChild(v);}catch(e){} };

    const doCapture=async()=>{
      if(captured) return; captured=true;
      try{ v.pause(); }catch(e){}
      try{
        const c=document.getElementById('wmc');
        // Use natural video resolution (fallback to 1280x720 for quality)
        const w=Math.max(v.videoWidth||0,1280), h=Math.max(v.videoHeight||0,720);
        c.width=w; c.height=h;
        const ctx=c.getContext('2d');
        ctx.drawImage(v,0,0,w,h);
        // Play button overlay circle
        const r=Math.min(w,h)*0.1;
        ctx.fillStyle='rgba(0,0,0,.55)';
        ctx.beginPath(); ctx.arc(w/2,h/2,r,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#fff';
        ctx.font='bold '+Math.round(r*1.1)+'px sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('\u25B6',w/2+r*0.08,h/2);
        cleanup();
        res(await wmAdd(c.toDataURL('image/jpeg',.88),meta));
      }catch(e){ cleanup(); res(null); }
    };

    v.addEventListener('timeupdate',doCapture,{once:true});
    v.addEventListener('seeked',doCapture,{once:true});
    v.addEventListener('canplay',()=>{ v.play().catch(()=>{ v.currentTime=0.5; }); },{once:true});
    v.addEventListener('error',()=>{ cleanup(); res(null); },{once:true});
    setTimeout(()=>{ if(!captured){ doCapture(); } }, 6000);

    v.src=src; v.load();
  });
}


async function procFile(file, meta){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=async e=>{
      const orig=e.target.result; let wm=orig;
      if(file.type.startsWith('image/')) wm=await wmAdd(orig,meta);
      else if(file.type.startsWith('video/')) wm=await wmVid(orig,meta);
      res({original:orig, watermarked:wm, name:file.name, type:file.type});
    }; r.onerror=rej; r.readAsDataURL(file);
  });
}

function wmMeta(){
  const ot=curOT()||{};
  const gps=ot.h3?.gps||'0,0';
  const now=new Date();
  // Usar hora local del dispositivo
  const pad=n=>String(n).padStart(2,'0');
  const fecha=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  return{fecha,est:ot.estacion||'EB-?',coords:gps,ot:ot.numero||ot.id||'OT-?'};
}

   EVIDENCIAS UI HELPERS
   ═══════════════════════════════════════════════════════════ */
let _lbxSec='', _lbxOtId='', _lbxIdx=0;

async function hFI(inp, sec, phase='antes'){
  const ot=curOT(); if(!ot)return;
  const files=Array.from(inp.files); const meta=wmMeta();
  if(files.length>3) showToast(`⏳ Procesando ${files.length} archivos…`,'info');
  for(let fi_i=0;fi_i<files.length;fi_i++){
    const f=files[fi_i];
    if(files.length>5) showToast(`📷 ${fi_i+1}/${files.length} procesando…`,'info');
    const fd=await procFile(f,meta); fd.phase=phase;
    // Si wmVid devolvió null, usar original como fallback
    if(fd.watermarked===null) fd.watermarked=null;
    // Subir imagen watermarked a Firebase Storage para sincronizar entre dispositivos
    if(window.subirBase64 && fd.watermarked && !f.type.startsWith('video/')){
      try{
        const ext=(f.name.split('.').pop()||'jpg').replace(/[^a-zA-Z0-9]/g,'');
        fd.url=await window.subirBase64(fd.watermarked,'wm_'+Date.now()+'.'+ext);
      }catch(e){console.warn('Upload foto fallido:',e);}
    }
    // Subir video original a Firebase Storage
    if(window.subirVideo && fd.original && f.type.startsWith('video/')){
      try{
        const ext=(f.name.split('.').pop()||'mp4').replace(/[^a-zA-Z0-9]/g,'');
        fd.url=await window.subirVideo(fd.original,'vid_'+Date.now()+'.'+ext);
      }catch(e){console.warn('Upload video fallido:',e);}
    }
    addEvid(ot.id,sec,fd);
    // Notificar actividad del personal
    const u=STATE.currentUser;
    if(u&&u.rol==='tecnico'){
      const tipo=f.type.startsWith('video/')? '🎥 Video':'📷 Evidencia';
      const label=sec.replace(/_/g,' ');
      const msg=`${tipo} ${phase}: ${label} | Técnico: ${u.nombre||u.usuario} | OT: ${ot.numero||ot.id}`;
      addNotif(msg,ot.id,'actividad',ot.contratistaId);
      updateNotifBadge();
    }
  }
  if(files.length>1) showToast(`✅ ${files.length} archivos cargados`,'ok');
  save();
  rp(STATE.tab);
}

      : `<img src="${f.url||f.watermarked}" alt="${f.name}" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover">`;
    return`<div style="position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;width:85px;min-width:85px;height:85px;flex-shrink:0;background:var(--ink3);cursor:pointer" onclick="lbxOpen('${otId}','${sec}',${i})">

    </div>`;
  }).join('');
  const moreBtn=extra>0
    ? `<div onclick="lbxOpen('${otId}','${sec}',${MAX_SHOW})" style="border-radius:8px;width:85px;height:85px;flex-shrink:0;background:var(--ink3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;border:2px dashed rgba(0,229,195,.3)"><span style="font-size:1.1rem;font-weight:800;color:var(--cyan)">+${extra}</span><span style="font-size:.58rem;color:var(--g3)">más fotos</span></div>`

function lbxOpenImg(src,cap){
  const el=document.getElementById('lbx');
  if(!el) return;
  const isVideo=src.startsWith('data:video')||/\.(mp4|webm|mov|avi)$/i.test(cap||'');
  const imgEl=document.getElementById('lbx-img');
  const vidEl=document.getElementById('lbx-vid');
  // Hide nav arrows for standalone (no context)
  const prev=document.getElementById('lbx-prev');
  const next=document.getElementById('lbx-next');
  if(prev) prev.style.display='none';
  if(next) next.style.display='none';
  if(isVideo){
    imgEl.style.display='none';
    vidEl.style.display='block';
    vidEl.src=src;
    vidEl.load();
    // No forzamos play; el usuario usa los controles del video
  } else {
    if(vidEl){vidEl.pause&&vidEl.pause();vidEl.style.display='none';vidEl.src='';}
    imgEl.style.display='block';imgEl.src=src;
  }
  document.getElementById('lbx-cap').textContent=cap||'';
  const dl=document.getElementById('lbx-dl');
  if(dl){dl.href=src;dl.download=cap||'archivo';}
  el.style.display='flex';
}

function lbxOpen(otId,sec,idx){
  const evs=getEvid(otId,sec); if(!evs.length)return;
  const f=evs[idx]; if(!f)return;
  _lbxOtId=otId; _lbxSec=sec; _lbxIdx=idx;
  const cap=`${f.name} — ${sec} (${idx+1}/${evs.length})`;
  const isVideo=f.type&&f.type.startsWith('video/');
  const src=isVideo?(f.url||f.original||f.watermarked):(f.url||f.watermarked);
  const el=document.getElementById('lbx');
  if(!el) return;
  const imgEl=document.getElementById('lbx-img');
  const vidEl=document.getElementById('lbx-vid');
  const prev=document.getElementById('lbx-prev');
  const next=document.getElementById('lbx-next');
  // Show/hide nav based on count
  if(prev) prev.style.display=evs.length>1?'flex':'none';
  if(next) next.style.display=evs.length>1?'flex':'none';
  if(isVideo){
    imgEl.style.display='none';
    vidEl.style.display='block';
    vidEl.src=src;
    vidEl.load();
    // No forzamos play automático para evitar bloqueo del navegador; el usuario usa los controles
  } else {
    if(vidEl){vidEl.pause&&vidEl.pause();vidEl.style.display='none';vidEl.src='';}
    imgEl.style.display='block';imgEl.src=src;
    const fb=document.getElementById('lbx-img-fallback');if(fb)fb.style.display='none';
  }
  document.getElementById('lbx-cap').textContent=cap;
  const dl=document.getElementById('lbx-dl');
  if(dl){dl.href=src;dl.download=f.name||'archivo';}
  el.style.display='flex';
}

function lbxNav(dir){
  const evs=getEvid(_lbxOtId,_lbxSec);if(!evs.length)return;
  _lbxIdx=(_lbxIdx+dir+evs.length)%evs.length;
  lbxOpen(_lbxOtId,_lbxSec,_lbxIdx);
}

async function lbxReplace(inp){
  const file=inp.files?.[0];if(!file)return;
  const ot=getOT(_lbxOtId);if(!ot)return;
  const meta=wmMeta();
  showToast('⏳ Procesando...','info');
  const fd=await procFile(file,meta);
  fd.phase=getEvid(_lbxOtId,_lbxSec)[_lbxIdx]?.phase||'antes';
  const k=_evKey(_lbxOtId,_lbxSec);
  if(!STATE.evidencias[k]) STATE.evidencias[k]=[];
  STATE.evidencias[k][_lbxIdx]=fd;
  saveEvidencias();
  showToast('✅ Archivo reemplazado','ok');
  lbxClose();
  rp(STATE.tab);
}

function lbxClose(){
  const el=document.getElementById('lbx');
  if(!el) return;
  const vidEl=document.getElementById('lbx-vid');
  if(vidEl){vidEl.pause&&vidEl.pause();vidEl.src='';}
  el.style.display='none';
}

/* ── Navegación teclado en lightbox ── */
document.addEventListener('keydown',function(e){
  const lbx=document.getElementById('lbx');
  if(!lbx||lbx.style.display==='none') return;
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();lbxNav(-1);}
  else if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();lbxNav(1);}
  else if(e.key==='Escape'){lbxClose();}
});

function lbxDelete(){
  delEvid(_lbxOtId,_lbxSec,_lbxIdx);
  lbxClose();
  rp(STATE.tab);
}


function fi(sec,label,tip='',multi=false,accept='image/*,video/*',required=false,phase='antes',locked=false){
  const ot=curOT();
  const n=ot?getEvid(ot.id,sec).length:0;
  const req=required&&n===0?'<div style="font-size:.76rem;color:var(--red);margin-top:4px">⚠️ Se requiere al menos 1 foto.</div>':'';
  const tipHtml=tip?`<small style="color:var(--g3);font-size:.72rem;display:block;margin-bottom:4px">${tip}</small>`:'';
  let fileEl='';
  if(!locked){
    const isImgOnly=accept==='image/*';
    const isVidOnly=accept==='video/*';
    const captureAttr=isImgOnly?'capture="environment"':isVidOnly?'capture="environment"':'';
    fileEl=`<input type="file" accept="${accept}" ${multi?'multiple':''} ${captureAttr} data-sec="${sec}" data-phase="${phase}" style="margin-top:4px">`;
  }
  return`<div class="fg">
    <label>${label+(required?' *':'')}</label>
    ${tipHtml}${fileEl}${req}${ot?prevs(sec,phase):''}
  </div>`;
}



/* ═══════════════════════════════════════════════════════════
   H4 – ACTIVIDADES (Ejecución)
   ═══════════════════════════════════════════════════════════ */

/* Renderizar vista de H4 */
function rH4(ot){
  const u = STATE.currentUser;
  const isTec = u?.rol==='tecnico';
  const isTab = u?.rol==='tabasco';
  // Non-tecnico always sees H4 as read-only
  const globalLocked = ot.h4Saved || !isTec;
  const obs = ot.h4?.obsCierre||'';
  const items = ot.itemsAprobados||[];
  
  // Calcular progreso
  const itemsDone = items.filter((_,idx)=>ot.h4?.itemDone?.[idx]).length;
  const pct = items.length>0 ? Math.round((itemsDone/items.length)*100) : 0;
  
  let html = `<div class="sec-header"><span class="sec-icon">④</span>Actividades — ${ot.estacion}</div>`;

  if(!items.length){
    html += `<div class="card"><p class="t-sm t-c" style="color:var(--warn)">⚠️ No hay ítems aprobados cargados aún. Tabasco debe cargarlos primero.</p></div>`;
  } else {
    // Barra de progreso
    html += `<div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span class="t-sm" style="font-weight:700">Avance: ${pct}%</span>
        <span class="t-sm" style="color:var(--ok)">${itemsDone} / ${items.length} completados</span>
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    </div>`;

    items.forEach((item,idx)=>{
      const itemDone = ot.h4?.itemDone?.[idx]||false;
      const filas = item.filas||[{id:0,ubic:'',cant:'',largo:'',ancho:'',alto:'',obs:''}];
      const itemLocked = globalLocked || itemDone;
      
      html += `<div class="dyn" style="margin-bottom:16px;${itemDone?'border-color:rgba(29,218,122,.3);background:rgba(29,218,122,.03)':''}">
        <div class="dyn-header">
          <div>
            <div class="t-sm" style="font-weight:700">
              ${itemDone?'✅':'⬜'} ${item.nombre||item.codigo||'Sin nombre'}
           </div>
          ${item.codigo?`<div style="font-size:.68rem;color:var(--g3);font-family:monospace">${item.codigo}</div>`:''}
        </div>
       <div style="display:flex;gap:6px;align-items:center">
         ${item.refImg?`<img src="${item.refImg}" style="height:36px;border-radius:4px;object-fit:cover;cursor:pointer" onclick="lbxOpenImg('${item.refImg}','Ref: ${(item.nombre||item.codigo||'').replace(/'/g,'')}')">`:``}
         ${!globalLocked&&itemDone?`<button class="btn sm bd" style="font-size:.7rem" onclick="toggleItemH4('${ot.id}',${idx},false)">✏️ Editar</button>`:''}
         ${!globalLocked?`<button class="btn sm" style="font-size:.7rem;background:var(--ok);color:var(--ink)" onclick="toggleItemH4('${ot.id}',${idx},true)">✅ Completar</button>`:''}
       </div>
     </div>`;
      
      filas.forEach((f,fIdx)=>{
        html += `<div style="background:var(--bg2);border-radius:8px;padding:10px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <div class="t-sm t-c" style="font-weight:700">Fila ${fIdx+1}${f.ubic?' — '+f.ubic:''}</div>
            ${f.refImg?`<img src="${f.refImg}" style="height:36px;border-radius:4px;object-fit:cover;cursor:pointer" onclick="lbxOpenImg('${f.refImg}','Ref fila ${fIdx+1}')">`:``}
          </div>
          <!-- Datos del ítem: SOLO LECTURA para todos (los carga Tabasco) -->
          <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:8px;margin-bottom:8px;font-size:.8rem">
            ${f.ubic?`<span style="color:var(--g2)">Ubic: </span>${f.ubic} `:''}
            ${f.cant?`<span style="color:var(--g2)">Cant: </span><b>${f.cant}</b> `:''}
            ${f.largo?`<span style="color:var(--g2)">L: </span>${f.largo}m `:''}
            ${f.ancho?`<span style="color:var(--g2)">An: </span>${f.ancho}m `:''}
            ${f.alto?`<span style="color:var(--g2)">Al: </span>${f.alto}m`:''}
            ${f.obs?`<div style="color:var(--t2);margin-top:4px">${f.obs}</div>`:''}
            ${(!f.ubic&&!f.cant&&!f.largo)?`<span style="color:var(--g3)">Sin medidas registradas</span>`:''}
          </div>
          <!-- Solo el técnico agrega fotos -->
          ${fi('h4_ev_'+idx+'_'+fIdx,'Evidencias de esta fila (DESPUÉS)','',true,'image/*,video/*',false,'despues',itemLocked)}
          <!-- Sub-actividades checklist -->
          ${(()=>{
            const acts=item.actividades||[];
            if(!acts.length) return '';
            const actData=(ot.h4?.itemActividades?.[idx]?.[fIdx])||{};
            return `<div style="background:rgba(0,229,195,.05);border:1px solid rgba(0,229,195,.15);border-radius:8px;padding:10px;margin-top:6px">
              <div style="font-size:.75rem;font-weight:700;color:var(--cyan);margin-bottom:8px">📋 Sub-actividades</div>
              ${acts.map(act=>{
                const checked=!!actData[act];
                return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)" onclick="${!itemLocked?`toggleActividadH4('${ot.id}',${idx},${fIdx},'${act.replace(/'/g,'&#39;')}',${!checked})`:''}">
                  <span style="font-size:1rem;cursor:${itemLocked?'default':'pointer'}">${checked?'✅':'⬜'}</span>
                  <span style="font-size:.8rem;color:${checked?'var(--ok)':'var(--white)'}">${escHtml(act)}</span>
                </div>`;
              }).join('')}
            </div>`;
          })()}
        </div>`;
      });
      
      html += `</div>`;
    });
    html += ``;
  }

  // Observaciones de cierre
  html += `<div class="card">
    <div class="st">Observaciones de Cierre</div>
    <div class="fg">
      <label>Observaciones generales del trabajo realizado <span style="color:var(--danger)">*</span></label>
      <textarea rows="4" ${globalLocked?'readonly':''} onchange="setH4Obs(this.value)" placeholder="Describe el estado del trabajo, novedades, condiciones encontradas...">${obs}</textarea>
    </div>
    ${globalLocked
      ? `<div class="badge ok" style="margin-top:8px">✅ Actividades guardadas</div>`
      : `<button class="btn" onclick="saveH4()" style="margin-top:12px;width:100%">💾 Guardar Actividades</button>`
    }
  </div>`;

  return html;
}

/* Marcar/desmarcar sub-actividad de H4 */
function toggleActividadH4(otId, idx, filaIdx, actividad, val){
  const ot=getOT(otId);if(!ot)return;
  ot.h4=ot.h4||{};
  ot.h4.itemActividades=ot.h4.itemActividades||{};
  ot.h4.itemActividades[idx]=ot.h4.itemActividades[idx]||{};
  ot.h4.itemActividades[idx][filaIdx]=ot.h4.itemActividades[idx][filaIdx]||{};
  ot.h4.itemActividades[idx][filaIdx][actividad]=val;
  save();
  iH4(otId);
}

/* Marcar/desmarcar ítem de H4 como completado */
function toggleItemH4(otId, idx, done){
  const ot=getOT(otId);if(!ot)return;
  if(done){
    const item=ot.itemsAprobados?.[idx];
    const filas=item?.filas||[{}];
    let errors=[];
    filas.forEach((f,fi)=>{
      const nFotos=getEvid(otId,'h4_ev_'+idx+'_'+fi).length;
      if(!nFotos) errors.push(`Fila ${fi+1}: falta al menos 1 foto de evidencia.`);
    });
    if(errors.length){
      openModal(`<div style="text-align:center;padding:8px">
        <div style="font-size:2rem;margin-bottom:8px">⚠️</div>
        <div style="font-size:.95rem;font-weight:700;color:var(--gold);margin-bottom:10px">No se puede completar</div>
        <div style="background:rgba(255,182,39,.08);border:1px solid rgba(255,182,39,.2);border-radius:8px;padding:10px;margin-bottom:14px;text-align:left">
          ${errors.map(e=>`<div style="font-size:.8rem;color:var(--g2);padding:3px 0">• ${e}</div>`).join('')}
        </div>
        <button class="btn" style="width:100%" onclick="closeModal()">Entendido</button>
      </div>`);
      return;
    }
  }
  ot.h4=ot.h4||{};
  ot.h4.itemDone=ot.h4.itemDone||{};
  ot.h4.itemDone[idx]=done;
  const item=ot.itemsAprobados?.[idx];
  addHist(ot,(done?'Ítem completado: ':'Ítem desbloqueado: ')+(item?.nombre||item?.codigo||'Item '+idx));
  save();
  showToast(done?'✅ Ítem marcado como completado':'🔓 Ítem desbloqueado','ok');
  iH4(otId);
}

/* Actualizar campo de ítem en H4 */
function upH4Item(itemIdx,filaIdx,field,val){
  const ot=curOT();if(!ot)return;
  ot.h4=ot.h4||{};
  ot.h4.evItems=ot.h4.evItems||[];
  while(ot.h4.evItems.length<=itemIdx) ot.h4.evItems.push({filas:[]});
  const ev=ot.h4.evItems[itemIdx];
  ev.filas=ev.filas||[];
  while(ev.filas.length<=filaIdx) ev.filas.push({});
  ev.filas[filaIdx][field]=val;
  save();
}

/* Observaciones de cierre H4 */
function setH4Obs(v){
  const ot=curOT();if(!ot)return;
  ot.h4=ot.h4||{};
  ot.h4.obsCierre=v;
  save();
}

/* Guardar H4 */
function saveH4(){
  const ot=curOT();if(!ot)return;
  const items=ot.itemsAprobados||[];
  const errors=[];
  items.forEach((item,idx)=>{
    if(!ot.h4?.itemDone?.[idx]) errors.push(`${item.nombre||item.codigo||'Ítem '+(idx+1)}: no completado`);
  });
  if(!ot.h4?.obsCierre||!ot.h4.obsCierre.trim()) errors.push('Observaciones de cierre: campo obligatorio');
  if(errors.length){
    openModal(`
      <div style="text-align:center;padding:8px">
        <div style="font-size:2rem;margin-bottom:8px">⚠️</div>
        <div style="font-size:.95rem;font-weight:700;color:var(--gold);margin-bottom:8px">Actividades incompletas</div>
        <p class="t-sm" style="color:var(--g2);margin-bottom:12px">Debes completar todos los ítems antes de guardar.</p>
        <div style="background:rgba(255,182,39,.08);border:1px solid rgba(255,182,39,.2);border-radius:8px;padding:10px;margin-bottom:14px;text-align:left;max-height:180px;overflow-y:auto">
          ${errors.map(e=>`<div style="font-size:.78rem;padding:3px 0;color:var(--g2)">• ${e}</div>`).join('')}
        </div>
        <button class="btn" style="width:100%" onclick="closeModal()">Entendido — revisar</button>
      </div>`);
    return;
  }
  openModal(`
    <div style="text-align:center;padding:8px">
      <div style="font-size:2rem;margin-bottom:8px">💾</div>
      <div style="font-size:.95rem;font-weight:700;margin-bottom:8px">¿Guardar actividades?</div>
      <p class="t-sm" style="color:var(--g2);margin-bottom:16px">Una vez guardadas no podrás realizar modificaciones sin que Tabasco desbloquee las actividades.</p>
      <div style="display:flex;gap:10px">
        <button class="btn" style="flex:1" onclick="_confirmSaveH4()">✅ Sí, guardar</button>
        <button class="btn bd" style="flex:1" onclick="closeModal()">Cancelar</button>
      </div>
    </div>`);
}
function _confirmSaveH4(){
  const ot=curOT();if(!ot)return;
  ot.h4=ot.h4||{};
  ot.h4Saved=true;
  ot.h4.fechaGuardado=new Date().toISOString();
  addHist(ot,'Actividades guardadas');
  notifActividad('Hoja de Actividades (H4) guardada — trabajo completado',ot.id);
  // Notificación con acceso directo a H4 para admin/tabasco
  addNotif(`✅ Técnico completó actividades — ${ot.estacion} (${ot.numero}). Avance: 90%`,ot.id,'h4_completado',ot.contratistaId);
  save();
  closeModal();
  showToast('✅ Actividades guardadas correctamente','ok');
  iH4(ot.id);
}

/* Inicializar vista H4 (tab ④) */
/* Build tabs bar for técnico — only show tabs that are relevant */
function _buildTabs(ot,otId,active){
  const hasItems=(ot.itemsAprobados||[]).length>0;
  const hasGar=ot.garantia?.activa;
  let t=`<button class="tab${active===3?' active':''}" onclick="iH3('${otId}')">③ Levant.</button>`;
  if(hasItems) t+=`<button class="tab${active===4?' active':''}" onclick="iH4('${otId}')">④ Actividades</button>`;
  if(hasGar)   t+=`<button class="tab${active===5?' active':''}" onclick="iH5('${otId}')">⑤ Garantía</button>`;
  return t;
}


function iH4(otId){
  STATE.currentOT=otId;
  STATE.tab=4;
  const ot=getOT(otId);if(!ot)return;
  const _u4=STATE.currentUser;
  const _isTec4=_u4?.rol==='tecnico';
  // Tecnico: bloquear si no cumple requisitos; otros roles: acceso directo en lectura
  if(_isTec4){
    if(!ot.h3Saved){showToast('⚠️ Debes guardar el levantamiento primero.','warn');iH3(otId);return;}
    if(!(ot.itemsAprobados||[]).length){
      showToast('⏳ Aún no hay ítems aprobados cargados. Espera que Tabasco los asigne.','warn');
      iH3(otId);return;
    }
    if(!ot.eppCompletado){iH_EPP(otId);return;}
  }
  const tabs=_buildTabs(ot,otId,4);
  renderMain(`
    <div class="sticky-back">
      <button class="btn bd sm" onclick="_goBack4('${otId}')">← Volver</button>
    </div>
    <div class="tabs-bar">${tabs}</div>
    <div class="view-wrap">${rH4(ot)}</div>
    `);
  setTimeout(bindFileInputs, 50);
}

/* ── EPP Checklist (antes de ejecución) ── */
function iH_EPP(otId){
  STATE.currentOT=otId;
  const ot=getOT(otId);if(!ot)return;
  const cat=STATE.eppCatalog||DEFAULT_EPP;
  const eppData=ot.eppData||{};
  const allChecked=cat.length>0&&cat.every(e=>eppData[e.id]);
  const nFotoEPP=getEvid(otId,'epp_foto_personal').length;
  const canContinue=allChecked&&nFotoEPP>0;
  
  let html=`
    <div class="sticky-back"><button class="btn bd sm" onclick="_goBackEPP('${otId}')">← Volver</button></div>
    <div class="sec-header"><span class="sec-icon">🦺</span>Verificación EPP — ${ot.estacion}</div>
    <div class="card">
      <p class="t-sm" style="color:var(--g2);margin-bottom:14px">
        Antes de iniciar la ejecución de actividades, confirma que todos los integrantes del equipo cuentan con los EPPs requeridos.
      </p>
      ${cat.map(e=>`
        <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="toggleEPP('${otId}','${e.id}')">
          <span style="font-size:1.3rem">${eppData[e.id]?'✅':'⬜'}</span>
          <span class="t-sm" style="font-weight:600;flex:1">${e.nombre}</span>
        </div>`).join('')}
      <div style="margin-top:16px">
        ${fi('epp_foto_personal','📸 Foto del personal con EPPs puestos *','Toma una foto de todo el equipo con sus elementos puestos antes de iniciar.',false,'image/*',true,'antes',ot.eppCompletado)}
      </div>
    </div>
    ${canContinue?`
    <div class="card" style="border-color:rgba(29,218,122,.3);background:rgba(29,218,122,.04)">
      <div class="t-sm" style="color:var(--ok);font-weight:700;margin-bottom:10px">✅ Todos los EPPs verificados</div>
      <button class="btn" style="width:100%" onclick="completarEPP('${otId}')">Continuar a Ejecución →</button>
    </div>`:`
    <div class="card" style="border-color:rgba(255,182,39,.3);background:rgba(255,182,39,.04)">
      ${!allChecked?`<p class="t-sm" style="color:var(--gold)">⚠️ Marca todos los EPPs como verificados para continuar.</p>`:''}
      ${allChecked&&nFotoEPP===0?`<p class="t-sm" style="color:var(--gold)">📸 Todos los EPPs verificados. Carga la foto del personal para continuar.</p>`:''}
    </div>`}`;
  
  renderMain(html);
  setTimeout(bindFileInputs,50);
}

function toggleEPP(otId,eppId){
  const ot=getOT(otId);if(!ot)return;
  ot.eppData=ot.eppData||{};
  ot.eppData[eppId]=!ot.eppData[eppId];
  save();iH_EPP(otId);
}

function completarEPP(otId){
  const ot=getOT(otId);if(!ot)return;
  const cat=STATE.eppCatalog||DEFAULT_EPP;
  const eppData=ot.eppData||{};
  if(!cat.every(e=>eppData[e.id])){showToast('⚠️ Debes verificar todos los EPPs','warn');return;}
  // Check foto EPP
  const nFoto=getEvid(otId,'epp_foto_personal').length;
  if(!nFoto){showToast('⚠️ Se requiere foto del personal con EPPs','warn');return;}
  ot.eppCompletado=true;
  addHist(ot,'EPPs verificados — inicio de ejecución');
  notifActividad('EPPs verificados — iniciando ejecución',otId);
  save();
  showToast('✅ EPPs verificados — iniciando ejecución','ok');
  iH4(otId);
}


/* ═══════════════════════════════════════════════════════════
   H5 – GARANTÍA (Vista técnico)
   ═══════════════════════════════════════════════════════════ */

function rH5(ot){
  const g=ot.garantia||{};
  const _u5=STATE.currentUser;
  // Roles
  const isTab5=_u5?.rol==='tabasco';
  const isTec5=_u5?.rol==='tecnico';
  const isAdmin5=_u5?.rol==='admin';
  const isBO5=_u5?.rol==='backoffice';
  // locked total: garantía guardada O usuario es admin/backoffice (readonly total)
  const locked=g.h4Saved||(isAdmin5||isBO5);
  // filasLocked: técnico puede editar filas/fotos; tabasco también puede ver y completar
  // admin/backoffice: readonly total (locked=true)
  const items=g.items||[];
  const obs=g.h4ObsCierre||'';
  const otId=ot.id;

  let html=`<div class="sec-header"><span class="sec-icon">⑤</span>Garantía — ${ot.estacion}</div>`;

  // Banner readonly para admin/backoffice
  if((isAdmin5||isBO5)&&!g.h4Saved){
    html+=`<div class="locked-banner">🔒 Vista de sólo lectura — solo el técnico y Tabasco pueden operar la garantía.</div>`;
  }
  // Banner readonly si ya guardada
  if(g.h4Saved){
    html+=`<div style="background:rgba(29,218,122,.08);border:1px solid rgba(29,218,122,.25);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:.82rem;color:var(--ok);display:flex;align-items:center;gap:8px">✅ Garantía guardada — sólo lectura.</div>`;
  }

  if(!items.length){
    html+=`<div class="card"><p class="t-sm t-c" style="color:var(--warn)">⚠️ Tabasco no ha cargado ítems de garantía aún.</p></div>`;
  } else {
    // Barra de progreso garantía
    const itemsDoneG=items.filter((_,idx)=>g.itemDone?.[idx]).length;
    const pctG=items.length>0?Math.round((itemsDoneG/items.length)*100):0;

        <span class="t-sm" style="font-weight:700">Avance Garantía: ${pctG}%</span>

        <div class="dyn-header">
          <div style="flex:1;min-width:0">
            <span class="t-sm" style="font-weight:700;display:block;margin-bottom:6px">${itemDoneG?'✅':'⬜'} GAR ${idx+1}</span>
            <div class="fr" style="gap:8px;margin-bottom:4px">
              <div class="fg" style="margin-bottom:0"><label style="font-size:.68rem">Código</label>
                <input type="text" value="${item.codigo||''}" ${!isTab5?'readonly':''} onchange="upGarItemField('${otId}',${idx},'codigo',this.value)" style="font-family:'JetBrains Mono',monospace;font-size:.8rem${!isTab5?';color:var(--g3)':''}">
              </div>
              <div class="fg" style="margin-bottom:0"><label style="font-size:.68rem">Nombre</label>
                <input type="text" value="${(item.nombre||'').replace(/"/g,'&quot;')}" ${!isTab5?'readonly':''} onchange="upGarItemField('${otId}',${idx},'nombre',this.value)" style="${!isTab5?'color:var(--g3)':''}">
              </div>
            </div>
            ${item.refImg?`<img src="${item.refImg}" style="height:40px;border-radius:4px;object-fit:cover;cursor:pointer;margin-top:4px" onclick="lbxOpenImg('${item.refImg}','Ref: ${(item.nombre||item.codigo||'').replace(/'/g,'')}')">`:``}
          </div>
          <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
            ${!g.h4Saved&&canComplete&&itemDoneG?`<button class="btn sm bd" style="font-size:.7rem" onclick="toggleItemH5('${otId}',${idx},false)">✏️ Editar</button>`:''}
            ${!g.h4Saved&&canComplete&&!itemDoneG?`<button class="btn sm" style="font-size:.7rem;background:var(--ok);color:var(--ink)" onclick="toggleItemH5('${otId}',${idx},true)">✅ Completar</button>`:''}

            <div class="fg"><label>Ubic.</label><input type="text" value="${f.ubic||''}" ${itemLocked?'readonly':''} onchange="upGarFila('${otId}',${idx},${fIdx},'ubic',this.value)"></div>
            <div class="fg"><label>Cant.</label><input type="number" value="${f.cant||''}" ${itemLocked?'readonly':''} onchange="upGarFila('${otId}',${idx},${fIdx},'cant',this.value)"></div>
            <div class="fg"><label>Largo(m)</label><input type="number" step="0.01" value="${f.largo||''}" ${itemLocked?'readonly':''} onchange="upGarFila('${otId}',${idx},${fIdx},'largo',this.value)"></div>
          </div>

            <div class="fg"><label>Ancho(m)</label><input type="number" step="0.01" value="${f.ancho||''}" ${itemLocked?'readonly':''} onchange="upGarFila('${otId}',${idx},${fIdx},'ancho',this.value)"></div>

          </div>
          <div class="fg"><label>Obs. fila</label><textarea ${itemLocked?'readonly':''} onchange="upGarFila('${otId}',${idx},${fIdx},'obs',this.value)">${f.obs||''}</textarea></div>
          ${fi('gar5_ev_'+idx+'_'+fIdx,'Evidencias de esta fila (DESPUÉS)','',true,'image/*,video/*',false,'despues',itemLocked)}
        </div>`).join('')}
      </div>`;
    });
  }

  html+=`<div class="card">
    <div class="st">Observaciones de Cierre de Garantía</div>
    <div class="fg">
      <label>Observaciones generales <span style="color:var(--danger)">*</span></label>
      <textarea rows="4" ${locked?'readonly':''} onchange="setH5Obs(this.value)" placeholder="Describe el trabajo de garantía realizado...">${obs}</textarea>
    </div>
    ${locked
      ?`<div class="badge ok" style="margin-top:8px">✅ Garantía guardada</div>`
      :isTec5
        ?`<button class="btn" onclick="saveGarantia()" style="margin-top:12px;width:100%">💾 Guardar Garantía</button>`
        :isTab5
          ?`<div style="margin-top:10px"><div class="badge bwn">🔧 Solo el técnico puede guardar la garantía</div></div>`
          :`<div class="badge brj" style="margin-top:8px">🔒 Vista de sólo lectura</div>`
    }
  </div>`;

  return html;
}

/* Marcar/desmarcar ítem de H5 (garantía) */
function toggleItemH5(otId, idx, done){
  const ot=getOT(otId);if(!ot)return;
  if(done){
    const item=ot.garantia?.items?.[idx];
    const filas=item?.filas||[{}];
    let errors=[];
    filas.forEach((f,fi)=>{
      const nFotos=getEvid(otId,'gar5_ev_'+idx+'_'+fi).length;
      if(!nFotos) errors.push(`Fila ${fi+1}: falta al menos 1 foto de evidencia.`);
    });
    if(errors.length){
      openModal(`<div style="text-align:center;padding:8px">
        <div style="font-size:2rem;margin-bottom:8px">⚠️</div>
        <div style="font-size:.95rem;font-weight:700;color:var(--gold);margin-bottom:10px">No se puede completar</div>
        <div style="background:rgba(255,182,39,.08);border:1px solid rgba(255,182,39,.2);border-radius:8px;padding:10px;margin-bottom:14px;text-align:left">
          ${errors.map(e=>`<div style="font-size:.8rem;color:var(--g2);padding:3px 0">• ${e}</div>`).join('')}
        </div>
        <button class="btn" style="width:100%" onclick="closeModal()">Entendido</button>
      </div>`);
      return;
    }
  }
  ot.garantia=ot.garantia||{};
  ot.garantia.itemDone=ot.garantia.itemDone||{};
  ot.garantia.itemDone[idx]=done;
  const item=ot.garantia?.items?.[idx];
  addHist(ot,(done?'Ítem garantía completado: ':'Ítem garantía desbloqueado: ')+(item?.nombre||item?.codigo||'Item '+idx));
  save();
  showToast(done?'✅ Ítem marcado como completado':'🔓 Ítem desbloqueado','ok');
  iH5(otId);
}

function upH5Item(idx,field,val){
  const ot=curOT();if(!ot)return;
  ot.garantia=ot.garantia||{};
  ot.garantia.h4=ot.garantia.h4||{};
  ot.garantia.h4[idx]=ot.garantia.h4[idx]||{};
  ot.garantia.h4[idx][field]=val;
  save();
}

function setH5Obs(v){
  const ot=curOT();if(!ot)return;
  ot.garantia=ot.garantia||{};
  ot.garantia.h4ObsCierre=v;
  save();
}

function saveGarantia(){
  const ot=curOT();if(!ot)return;
  const g=ot.garantia||{};
  const items=g.items||[];
  const errors=[];
  items.forEach((item,idx)=>{
    if(!g.itemDone?.[idx]) errors.push(`${item.nombre||item.codigo||'Ítem '+(idx+1)}: no completado`);
  });
  if(!g.h4ObsCierre||!g.h4ObsCierre.trim()) errors.push('Observaciones de cierre: campo obligatorio');
  if(errors.length){
    openModal(`
      <div style="text-align:center;padding:8px">
        <div style="font-size:2rem;margin-bottom:8px">⚠️</div>
        <div style="font-size:.95rem;font-weight:700;color:var(--gold);margin-bottom:8px">Garantía incompleta</div>
        <p class="t-sm" style="color:var(--g2);margin-bottom:12px">Debes completar todos los ítems de garantía antes de guardar.</p>
        <div style="background:rgba(255,182,39,.08);border:1px solid rgba(255,182,39,.2);border-radius:8px;padding:10px;margin-bottom:14px;text-align:left;max-height:180px;overflow-y:auto">
          ${errors.map(e=>`<div style="font-size:.78rem;padding:3px 0;color:var(--g2)">• ${e}</div>`).join('')}
        </div>
        <button class="btn" style="width:100%" onclick="closeModal()">Entendido — revisar</button>
      </div>`);
    return;
  }
  ot.garantia.h4Saved=true;
  ot.garantia.fechaGuardado=new Date().toISOString();
  addHist(ot,'Garantía guardada por técnico');
  notifActividad('Hoja de Garantía guardada — garantía completada',ot.id);
  // Notificación con shortcut a garantía para admin/tabasco
  addNotif(`🛡️ Técnico completó garantía — ${ot.estacion} (${ot.numero}). Pendiente subsanación por Tabasco.`,ot.id,'h5_completado',ot.contratistaId);
  save();
  showToast('✅ Garantía guardada','ok');
  iH5(ot.id);
}

function iH5(otId){
  STATE.currentOT=otId;
  STATE.tab=5;
  const ot=getOT(otId);if(!ot)return;
  const _u5x=STATE.currentUser;
  const _isTec5=_u5x?.rol==='tecnico';
  if(_isTec5&&!ot.h3Saved){showToast('⚠️ Completa el levantamiento primero.','warn');return;}
  if(!ot.garantia?.activa){showToast('No hay garantía activa para esta OT.','warn');return;}
  const tabs=_buildTabs(ot,otId,5);
  renderMain(`
    <div style="padding:8px 0 0">
      <button class="btn bd sm" onclick="_goBack5('${otId}')">← Volver</button>
    </div>
    <div class="tabs-bar">${tabs}</div>
    <div class="view-wrap">${rH5(ot)}</div>
    `);
  setTimeout(bindFileInputs, 50);
}

function getSecLabel(sec){
  const MAP={
    comunicacion:'1. Comunicación SO',transporte:'2. Transporte',
    ingreso:'3. Ingreso EB',poda:'4. Poda vegetación',
    cerramiento:'5. Cerramiento',porton:'6. Portón',
    placa:'7. Placa concreto',concertina:'8. Concertina',
    reflectores:'9. Reflectores',cuartos:'10. Cuartos',
    shelter:'11. Shelter',planta:'12. Planta eléctrica',
    placaEquipos:'13. Placa equipos',lineaVida:'14. Línea de vida',
    balizaje:'15. Balizaje',planoAlzada:'16. Plano alzada',
    baterias:'17. Baterías',cubierta:'Cubierta',
    plano_desc:'16. Plano mano alzada'
  };
  return MAP[sec]||sec;
}

function getSummary(ot){
  const h=ot.h3||{};
  const lines=[];
  // Comunicación SO
  if(h.so_desc) lines.push({sec:'Descripción SO',val:h.so_desc});
  if(h.so_fecha) lines.push({sec:'Fecha acordada',val:h.so_fecha});
  if(h.reflector_enc) lines.push({sec:'Reflectores enc.',val:h.reflector_enc});
  // Portón
  if(h.porton&&h.porton.estado) lines.push({sec:'Portón estado',val:h.porton.estado});
  if(h.porton&&h.porton.nPasadores) lines.push({sec:'Portón pasadores',val:h.porton.nPasadores});
  if(h.porton&&h.porton.nCandados) lines.push({sec:'Portón candados',val:h.porton.nCandados});
  // Placa concreto
  if(h.placa_concreto) lines.push({sec:'Placa concreto',val:h.placa_concreto.solicita==='si'?'Se solicita':'No se solicita'});
  // Concertina
  if(h.concertina&&h.concertina.estado) lines.push({sec:'Concertina estado',val:h.concertina.estado});
  if(h.concertina&&h.concertina.reqRep) lines.push({sec:'Concertina reparación',val:h.concertina.reqRep==='si'?'Sí':'No'});
  // Cuartos
  if(h.cuartos_count!==undefined) lines.push({sec:'Cuartos',val:h.cuartos_count||'0'});
  // Shelter
  if(h.shelter_hay) lines.push({sec:'Shelter',val:h.shelter_hay==='si'?'Sí hay':'No hay'+(h.shelter_count?' ('+h.shelter_count+')':'')});
  // Planta
  if(h.planta_hay) lines.push({sec:'Planta eléctrica',val:h.planta_hay==='si'?'Sí hay':'No hay'});
  // Línea de vida
  if(h.lv_vigente) lines.push({sec:'Línea de vida vigente',val:h.lv_vigente==='si'?'✅ Sí':'⚠️ No'});
  if(h.linea_vida&&h.linea_vida.largo) lines.push({sec:'LV largo',val:h.linea_vida.largo+'m'});
  // Balizaje
  if(h.balizaje_hay) lines.push({sec:'Balizaje',val:h.balizaje_hay==='si'?'Sí hay':'No hay'});
  // Baterías
  if(h.bateria_enc) lines.push({sec:'Baterías encofrado',val:h.bateria_enc==='si'?'Se solicita':'No se solicita'});
  // Plano
  if(h.plano_desc) lines.push({sec:'Plano mano alzada',val:h.plano_desc});
  // Cubierta
  if(h.cubierta&&h.cubierta.tipo) lines.push({sec:'Cubierta tipo',val:h.cubierta.tipo});
  if(h.cubierta&&h.cubierta.estado) lines.push({sec:'Cubierta estado',val:h.cubierta.estado});
  return lines;
}

/* Obtener todas las evidencias de un OT agrupadas por sección */
function getAllEvidencias(ot){
  const all=[];
  const ev=STATE.evidencias||{};
  Object.keys(ev).forEach(k=>{
    if(k.startsWith(ot.id+'__')){
      const field=k.slice(ot.id.length+2);
      const items=ev[k];
      if(Array.isArray(items)){
        items.forEach(f=>all.push({key:k,field,phase:f.phase||'antes',data:f.watermarked||f.original,url:f.url||''}));
      } else if(items){
        all.push({key:k,field,phase:'antes',data:items.watermarked||items,url:''});
      }
    }
  });
  return all;
}

/* ── PDF Informe Levantamiento ── */
async function genPDF(otId){
  const ot=getOT(otId||STATE.currentOT);if(!ot)return;
  showToast('📄 Generando PDF...','info');
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,M=15,RW=W-M*2;
    let y=M;
    // Helper seguro para añadir texto — evita el error jsPDF.lines con valores nulos
    const safeStr=(v)=>String(v==null?'—':v).replace(/[\u0000-\u001F\u007F]/g,' ').trim()||'—';
    const safeTxt=(v,maxW)=>{
      const s=safeStr(v);
      try{return doc.splitTextToSize(s,maxW);}catch(e){return[s.substring(0,60)];}
    };
    const pdfText=(s,x,yy,opts)=>{
      try{doc.text(safeStr(s),x,yy,opts||{});}catch(e){}
    };
    const pdfLines=(lines,x,yy)=>{
      if(!lines||!lines.length)return;
      try{doc.text(lines,x,yy);}catch(e){
        // fallback: imprimir línea a línea
        lines.forEach((l,i)=>{try{doc.text(safeStr(l),x,yy+i*4);}catch(e2){}});
      }
    };
    const nl=(n=10)=>{y+=n;if(y>285){doc.addPage();y=M;}};

    // Portada
    doc.setFillColor(15,23,42);
    doc.rect(0,0,W,40,'F');
    doc.setFontSize(16);doc.setFont('helvetica','bold');
    doc.setTextColor(255,255,255);
    pdfText('INFORME DE LEVANTAMIENTO',W/2,18,{align:'center'});
    doc.setFontSize(11);
    pdfText(`${safeStr(ot.estacion)} — ${safeStr(ot.numero)}`,W/2,28,{align:'center'});
    doc.setTextColor(0,0,0);
    y=50;

    // Datos del expediente
    doc.setFont('helvetica','bold');doc.setFontSize(11);
    pdfText('EXPEDIENTE',M,y);y+=6;
    doc.setFont('helvetica','normal');doc.setFontSize(9);
    const datos=[
      ['Sitio',ot.estacion],['OT',ot.numero],
      ['Contratista',getContratista(ot.contratistaId)?.nombre],
      ['Lugar de trabajo',ot.lugarTrabajo],
      ['Fecha creación',ot.fechaCreacion?fmtDate(ot.fechaCreacion):'—'],
      ['Fecha asignación',ot.fechaAsignacion?fmtDate(ot.fechaAsignacion):'—'],
      ['Fecha compromiso',ot.fechaCompromiso?fmtDate(ot.fechaCompromiso):'—'],
      ['GPS',ot.h3?.gps],
    ];
    datos.forEach(([k,v])=>{
      if(y>280){doc.addPage();y=M;}
      doc.setFont('helvetica','bold');pdfText(k+':',M,y);
      doc.setFont('helvetica','normal');pdfText(safeStr(v),M+50,y);
      y+=5;
    });

    nl(8);

    // Resumen secciones
    doc.setFont('helvetica','bold');doc.setFontSize(11);
    pdfText('RESUMEN DE LEVANTAMIENTO',M,y);y+=6;
    const sum=getSummary(ot);
    sum.forEach(({sec,val})=>{
      if(y>275){doc.addPage();y=M;}
      doc.setFont('helvetica','bold');doc.setFontSize(9);
      pdfText(safeStr(sec)+':',M,y);
      doc.setFont('helvetica','normal');
      const lines=safeTxt(val,RW-50);
      pdfLines(lines,M+50,y);
      y+=Math.max(5,lines.length*4.5);
    });

    // Ítems aprobados
    nl(6);
    doc.setFont('helvetica','bold');doc.setFontSize(11);
    pdfText('ITEMS APROBADOS',M,y);y+=6;
    (ot.itemsAprobados||[]).forEach((item,i)=>{
      if(y>275){doc.addPage();y=M;}
      doc.setFont('helvetica','bold');doc.setFontSize(9);
      const nomLines=safeTxt(`${i+1}. ${item.nombre||item.codigo}`,RW);
      pdfLines(nomLines,M,y);y+=nomLines.length*4.5+1;
      (item.filas||[]).forEach((f,fIdx)=>{
        if(y>275){doc.addPage();y=M;}
        doc.setFont('helvetica','normal');doc.setFontSize(8);
        let txt=`  Fila ${fIdx+1}`;
        if(f.ubic) txt+=` | Ubic: ${f.ubic}`;
        if(f.cant) txt+=` | Cant: ${f.cant}`;
        if(f.largo) txt+=` | L:${f.largo}m`;
        if(f.ancho) txt+=` | An:${f.ancho}m`;
        if(f.alto) txt+=` | Al:${f.alto}m`;
        if(f.obs) txt+=` | ${f.obs}`;
        const wrapped=safeTxt(txt,RW);
        pdfLines(wrapped,M,y);y+=wrapped.length*4+2;
      });
    });

    // Observaciones H4
    if(ot.h4?.obsCierre){
      nl(6);
      doc.setFont('helvetica','bold');doc.setFontSize(11);
      pdfText('OBSERVACIONES DE CIERRE',M,y);y+=6;
      doc.setFont('helvetica','normal');doc.setFontSize(9);
      const wrapped=safeTxt(ot.h4.obsCierre,RW);
      pdfLines(wrapped,M,y);y+=wrapped.length*4+4;
    }

    // Fotos (evidencias antes)
    const evs=getAllEvidencias(ot).filter(e=>e.phase==='antes'&&(e.data||e.url));
    if(evs.length){
      doc.addPage();y=M;
      doc.setFont('helvetica','bold');doc.setFontSize(12);
      pdfText('REGISTRO FOTOGRAFICO',M,y);y+=8;
      let col=0;
      for(const ev of evs){
        try{
          const iw=85,ih=60;
          const x=col===0?M:M+iw+5;
          if(y+ih>280){doc.addPage();y=M;col=0;}
          let imgData=ev.data;
          if(!imgData&&ev.url){
            try{
              const r=await fetch(ev.url);
              const blob=await r.blob();
              imgData=await new Promise(res=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.readAsDataURL(blob);});
            }catch(fe){imgData=null;}
          }
          if(imgData){
            const fmt=imgData.includes('data:image/png')?'PNG':'JPEG';
            doc.addImage(imgData,fmt,x,y,iw,ih);
          }
          doc.setFontSize(7);doc.setFont('helvetica','normal');
          pdfText(ev.field.replace(/_/g,' ').substring(0,30),x,y+ih+3);
          col++;
          if(col===2){col=0;y+=ih+10;}
        }catch(e){console.warn('Foto PDF error:',e);}
      }
    }

    // Pie de página
    const totalPags=doc.getNumberOfPages();
    for(let i=1;i<=totalPags;i++){
      doc.setPage(i);

    }

    doc.save(`Levantamiento_${safeStr(ot.numero)}_${safeStr(ot.estacion)}.pdf`);

  }catch(e){console.error(e);showToast('❌ Error PDF: '+e.message,'danger');}
}

/* ── ZIP Fotos ANTES ── */
async function genZIPAntes(otId){
  const ot=getOT(otId||STATE.currentOT);if(!ot)return;
  if(!window.JSZip){showToast('JSZip no cargado','warn');return;}
  showToast('📦 Generando ZIP...','info');
  try{
    const zip=new JSZip();
    const folder=zip.folder(`ANTES_${ot.numero}_${ot.estacion}`);
    const evs=getAllEvidencias(ot).filter(e=>e.phase==='antes'&&(e.data||e.url));
    let added=0;
    for(let i=0;i<evs.length;i++){
      const ev=evs[i];
      const fname=`${String(i+1).padStart(3,'0')}_${ev.field}`;
      if(ev.data&&ev.data.startsWith('data:')){
        const base64=ev.data.split(',')[1];
        const ext=ev.data.includes('png')?'png':'jpg';
        folder.file(`${fname}.${ext}`,base64,{base64:true});
        added++;
      } else if(ev.url){
        try{
          const resp=await fetch(ev.url);
          if(resp.ok){
            const blob=await resp.blob();
            const ext=blob.type.includes('png')?'png':'jpg';
            folder.file(`${fname}.${ext}`,blob);
            added++;
          }
        }catch(fe){console.warn('No se pudo descargar foto:',fe);}
      }
    }
    if(added===0){showToast('⚠️ No hay fotos ANTES para exportar','warn');return;}
    const blob=await zip.generateAsync({type:'blob'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`ANTES_${ot.numero}_${ot.estacion}.zip`;
    a.click();
    showToast(`✅ ZIP descargado (${added} fotos)`,'ok');
  }catch(e){console.error(e);showToast('❌ Error ZIP: '+e.message,'danger');}
}

async function genGarantiaPDF(otId){
  const ot=getOT(otId||STATE.currentOT);if(!ot)return;
  const g=ot.garantia||{};
  showToast('📄 Generando PDF Garantía...','info');
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,M=15;let y=M;
    // Portada
    doc.setFillColor(124,58,237);
    doc.rect(0,0,W,35,'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(16);doc.setFont('helvetica','bold');
    doc.text('INFORME DE GARANTÍA',W/2,15,{align:'center'});
    doc.setFontSize(10);doc.setFont('helvetica','normal');
    doc.text(`${ot.estacion} — ${ot.numero}`,W/2,25,{align:'center'});
    doc.setTextColor(0,0,0);
    y=45;
    // Ítems garantía
    doc.setFont('helvetica','bold');doc.setFontSize(11);
    doc.text('ÍTEMS DE GARANTÍA',M,y);y+=6;
    (g.items||[]).forEach((item,i)=>{
      doc.setFont('helvetica','bold');doc.setFontSize(9);
      doc.text(`${i+1}. ${item.nombre||item.codigo}`,M,y);y+=5;
      const gev=(g.h4||{})[i]||{};
      if(gev.ubic){doc.setFont('helvetica','normal');doc.setFontSize(8);doc.text(`  Ubicación: ${gev.ubic}`,M,y);y+=4;}
      if(gev.obs){doc.setFont('helvetica','normal');doc.setFontSize(8);const wr=doc.splitTextToSize(`  ${gev.obs}`,W-M*2);doc.text(wr,M,y);y+=wr.length*4+2;}
      if(y>280){doc.addPage();y=M;}
    });
    if(g.h4ObsCierre){
      y+=6;doc.setFont('helvetica','bold');doc.setFontSize(10);
      doc.text('OBSERVACIONES DE CIERRE',M,y);y+=5;
      doc.setFont('helvetica','normal');doc.setFontSize(9);
      const wr=doc.splitTextToSize(g.h4ObsCierre,W-M*2);
      doc.text(wr,M,y);y+=wr.length*4;
    }
    // Fotos garantía
    const evs=getAllEvidencias(ot).filter(e=>e.field.startsWith('gar_')&&e.data);
    if(evs.length){
      doc.addPage();y=M;
      doc.setFont('helvetica','bold');doc.setFontSize(12);
      doc.text('REGISTRO FOTOGRÁFICO GARANTÍA',M,y);y+=8;
      let col=0;
      for(const ev of evs){
        try{
          const iw=85,ih=60;
          const x=col===0?M:M+iw+5;
          doc.addImage(ev.data,'JPEG',x,y,iw,ih);
          doc.setFontSize(7);doc.text(ev.field.replace(/_/g,' '),x,y+ih+3);
          col++;
          if(col===2){col=0;y+=ih+10;}
          if(y>260){doc.addPage();y=M;col=0;}
        }catch(e){}
      }
    }
    doc.save(`Garantia_${ot.numero}_${ot.estacion}.pdf`);
    showToast('✅ PDF Garantía descargado','ok');
  }catch(e){console.error(e);showToast('❌ Error: '+e.message,'danger');}
}

/* ── Excel Presentación Gerencia con datos para gráficas ── */
async function genExcelPresentacion(){
  if(!window.XLSX){showToast('XLSX no cargado','warn');return;}
  showToast('📊 Generando Excel Presentación...','info');
  try{
    const wb=XLSX.utils.book_new();
    const ots=STATE.ots||[];
    const contratistas=STATE.contratistas||DEFAULT_CONTRATISTAS;

    // ── Hoja 1: Resumen Global ──
    const rows=[['OT','Sitio','Contratista','Lugar','F.Creación','F.Asignación','F.Compromiso','Avance%','Estado','Semáforo']];
    ots.forEach(ot=>{
      const sem=getSemaforo(ot);
      rows.push([
        ot.numero,ot.estacion,
        getContratista(ot.contratistaId)?.nombre||'—',
        ot.lugarTrabajo||'—',
        ot.fechaCreacion?fmtDate(ot.fechaCreacion):'—',
        ot.fechaAsignacion?fmtDate(ot.fechaAsignacion):'—',
        ot.fechaCompromiso?fmtDate(ot.fechaCompromiso):'—',
        calcProgress(ot),ot.estado||'—',sem.label
      ]);
    });
    const ws1=XLSX.utils.aoa_to_sheet(rows);
    ws1['!cols']=[{wch:14},{wch:24},{wch:22},{wch:16},{wch:14},{wch:14},{wch:14},{wch:10},{wch:14},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws1,'Resumen Global');

    // ── Hoja 2: OTs por Mes (datos para gráfica de barras) ──
    const porMes={};
    ots.forEach(ot=>{
      const d=ot.fechaCreacion?new Date(ot.fechaCreacion):new Date();
      const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      const lbl=`${d.toLocaleString('es',{month:'long'})} ${d.getFullYear()}`;
      if(!porMes[k]) porMes[k]={label:lbl,total:0,en_proceso:0,cargada:0,subsanada:0,finalizada:0,garantia:0};
      porMes[k].total++;
      porMes[k][ot.estado]=(porMes[k][ot.estado]||0)+1;
      if(ot.garantia?.activa) porMes[k].garantia++;
    });
    const mesesRows=[
      ['Mes','Total OTs','En Proceso','Cargadas','Subsanadas','Finalizadas','Con Garantía','Avance Prom. %'],
      ...Object.entries(porMes).sort(([a],[b])=>a.localeCompare(b)).map(([,m])=>{
        const mOts=ots.filter(o=>{
          const d=o.fechaCreacion?new Date(o.fechaCreacion):new Date();
          const lbl=`${d.toLocaleString('es',{month:'long'})} ${d.getFullYear()}`;
          return lbl===m.label;
        });
        const avProm=mOts.length?Math.round(mOts.reduce((s,o)=>s+calcProgress(o),0)/mOts.length):0;
        return[m.label,m.total,m.en_proceso||0,m.cargada||0,m.subsanada||0,m.finalizada||0,m.garantia||0,avProm];
      })
    ];
    const ws2=XLSX.utils.aoa_to_sheet(mesesRows);
    ws2['!cols']=[{wch:22},{wch:12},{wch:12},{wch:12},{wch:12},{wch:14},{wch:14},{wch:16}];
    XLSX.utils.book_append_sheet(wb,ws2,'OTs por Mes 📊');

    // ── Hoja 3: % de Sitios por Estado ──
    const estadoCount={en_proceso:0,pendiente:0,cargada:0,subsanada:0,finalizada:0,garantia_activa:0};
    ots.forEach(ot=>{
      estadoCount[ot.estado]=(estadoCount[ot.estado]||0)+1;
      if(ot.garantia?.activa) estadoCount.garantia_activa++;
    });
    const total=ots.length||1;
    const estadoRows=[
      ['Estado','Cantidad','% del Total'],
      ['En Proceso',estadoCount.en_proceso||0,+((estadoCount.en_proceso||0)/total*100).toFixed(1)],
      ['Pendiente',estadoCount.pendiente||0,+((estadoCount.pendiente||0)/total*100).toFixed(1)],
      ['Cargada',estadoCount.cargada||0,+((estadoCount.cargada||0)/total*100).toFixed(1)],
      ['Subsanada',estadoCount.subsanada||0,+((estadoCount.subsanada||0)/total*100).toFixed(1)],
      ['Finalizada',estadoCount.finalizada||0,+((estadoCount.finalizada||0)/total*100).toFixed(1)],
      ['Con Garantía Activa',estadoCount.garantia_activa||0,+((estadoCount.garantia_activa||0)/total*100).toFixed(1)],
    ];
    const ws3=XLSX.utils.aoa_to_sheet(estadoRows);
    ws3['!cols']=[{wch:24},{wch:12},{wch:14}];
    XLSX.utils.book_append_sheet(wb,ws3,'% por Estado 🥧');

    // ── Hoja 4: % por Contratista ──
    const contrRows=[['Contratista','Total OTs','En Proceso','Cargadas','Finalizadas','% Avance Prom.','% del Total']];
    contratistas.forEach(c=>{
      const cOts=ots.filter(o=>o.contratistaId===c.id);
      if(!cOts.length) return;
      const avProm=Math.round(cOts.reduce((s,o)=>s+calcProgress(o),0)/cOts.length);
      contrRows.push([
        c.nombre,cOts.length,
        cOts.filter(o=>o.estado==='en_proceso').length,
        cOts.filter(o=>['cargada','subsanada'].includes(o.estado)).length,
        cOts.filter(o=>o.estado==='finalizada').length,
        avProm,+(cOts.length/total*100).toFixed(1)
      ]);
    });
    const ws4=XLSX.utils.aoa_to_sheet(contrRows);
    ws4['!cols']=[{wch:26},{wch:12},{wch:12},{wch:12},{wch:14},{wch:18},{wch:14}];
    XLSX.utils.book_append_sheet(wb,ws4,'% por Contratista 🥧');

    // ── Hoja 5: Semáforo / Cumplimiento ──
    const semRows=[['Indicador','Cantidad','%']];
    const enPlazo=ots.filter(o=>getSemaforo(o).cls==='ok').length;
    const alerta=ots.filter(o=>getSemaforo(o).cls==='alerta').length;
    const riesgo=ots.filter(o=>getSemaforo(o).cls==='riesgo').length;
    const vencidas=ots.filter(o=>getSemaforo(o).cls==='danger').length;
    semRows.push(['🟢 En Plazo',enPlazo,+(enPlazo/total*100).toFixed(1)]);
    semRows.push(['🟡 Alerta (≤7d)',alerta,+(alerta/total*100).toFixed(1)]);
    semRows.push(['🟠 Riesgo (≤3d)',riesgo,+(riesgo/total*100).toFixed(1)]);
    semRows.push(['🔴 Vencidas',vencidas,+(vencidas/total*100).toFixed(1)]);
    const ws5=XLSX.utils.aoa_to_sheet(semRows);
    ws5['!cols']=[{wch:24},{wch:12},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws5,'Semáforo Cumplimiento');

    // ── Hoja 6: Por Contratista (detalle) ──
    const byC={};
    ots.forEach(ot=>{
      const cn=getContratista(ot.contratistaId)?.nombre||'Desconocido';
      byC[cn]=byC[cn]||[];byC[cn].push(ot);
    });
    Object.entries(byC).forEach(([cn,cots])=>{
      const crows=[['OT','Sitio','Avance%','Estado','Semáforo','F.Compromiso']];
      cots.forEach(ot=>crows.push([
        ot.numero,ot.estacion,calcProgress(ot),ot.estado||'—',
        getSemaforo(ot).label,ot.fechaCompromiso?fmtDate(ot.fechaCompromiso):'—'
      ]));
      const cwsn=cn.substring(0,28);
      const cws=XLSX.utils.aoa_to_sheet(crows);
      cws['!cols']=[{wch:14},{wch:24},{wch:10},{wch:14},{wch:12},{wch:14}];
      XLSX.utils.book_append_sheet(wb,cws,cwsn);
    });

    XLSX.writeFile(wb,`Presentacion_Gerencia_${new Date().toISOString().slice(0,10)}.xlsx`);
    showToast('✅ Excel con datos de gráficas descargado','ok');

    // Abrir informe HTML con gráficas reales
    setTimeout(()=>genInformeHTMLGraficas(),400);
  }catch(e){console.error(e);showToast('❌ Error: '+e.message,'danger');}
}

function genInformeHTMLGraficas(){

  // ── Contadores KPI por estado visual ──
  const kpiCount={};
  ots.forEach(o=>{const e=calcEstadoDisplay(o);kpiCount[e]=(kpiCount[e]||0)+1;});
  const garAct=ots.filter(o=>o.garantia?.activa&&o.estado!=='subsanada').length;

  // ── Datos por mes (todos estados visuales) ──
  const porMesMap={};
  ots.forEach(ot=>{
    const d=ot.fechaCreacion?new Date(ot.fechaCreacion):new Date();
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const lbl=d.toLocaleString('es',{month:'short'})+' '+d.getFullYear();
    if(!porMesMap[key]){porMesMap[key]={lbl,key,total:0}; Object.keys(estadosVisMap).forEach(e=>porMesMap[key][e]=0);}
    porMesMap[key].total++;
    const ev=calcEstadoDisplay(ot);
    porMesMap[key][ev]=(porMesMap[key][ev]||0)+1;
  });
  const mesesSorted=Object.entries(porMesMap).sort(([a],[b])=>a.localeCompare(b));
  const mLabels=JSON.stringify(mesesSorted.map(([,m])=>m.lbl));
  const mKeys=JSON.stringify(mesesSorted.map(([k])=>k));
  // Dataset por estado para la gráfica de meses
  const mesDatasets=JSON.stringify(Object.entries(estadosVisMap).map(([e,info])=>({
    label:info.l,
    data:mesesSorted.map(([,m])=>m[e]||0),
    backgroundColor:info.c+'CC',
    borderColor:info.c,
    borderWidth:1.5
  })));

  // ── Pie estados (usando calcEstadoDisplay) ──
  const estLabels=JSON.stringify(Object.values(estadosVisMap).map(v=>v.l));
  const estData=JSON.stringify(Object.keys(estadosVisMap).map(e=>kpiCount[e]||0));
  const estColors=JSON.stringify(Object.values(estadosVisMap).map(v=>v.c));

  // ── Semáforo ──
  let semOk=0,semAl=0,semRi=0,semVe=0;
  ots.forEach(o=>{const s=getSemaforo(o).cls;if(s==='ok')semOk++;else if(s==='alerta')semAl++;else if(s==='riesgo')semRi++;else if(s==='danger')semVe++;});

  // ── Barras por contratista ──
  const cnLabels=[],cnTotal=[],cnAvance=[];
  contratistas.forEach(c=>{
    const cOts=ots.filter(o=>o.contratistaId===c.id);
    if(!cOts.length) return;
    cnLabels.push(c.nombre);cnTotal.push(cOts.length);
    cnAvance.push(Math.round(cOts.reduce((s,o)=>s+calcProgress(o),0)/cOts.length));
  });

  // ── Avance por sitio (solo activos con alerta/riesgo/vencidos) ──
  const CERRADOS=['cargada','subsanada','cancelada'];
  const activosAlerta=ots.filter(o=>{
    if(CERRADOS.includes(o.estado)) return false;
    const sem=getSemaforo(o).cls;
    return sem==='alerta'||sem==='riesgo'||sem==='danger';
  }).slice(0,25);
  const avOtLabels=JSON.stringify(activosAlerta.map(o=>o.estacion.substring(0,18)));
  const avOtData=JSON.stringify(activosAlerta.map(o=>calcProgress(o)));
  const avOtColors=JSON.stringify(activosAlerta.map(o=>{
    const cls=getSemaforo(o).cls;
    return cls==='danger'?'rgba(255,77,94,.75)':cls==='riesgo'?'rgba(255,114,64,.75)':'rgba(255,182,39,.75)';
  }));
  // IDs de contratistas para filtrado
  const avOtContrs=JSON.stringify(activosAlerta.map(o=>o.contratistaId||''));

  // ── Tabla con última nota y estado visual ──
  const tablaRows=ots.map(ot=>{
    const sem=getSemaforo(ot);

    return `<tr data-estado="${estVis}" data-mes="${mesClave}" data-contr="${ot.contratistaId||''}">
      <td style="font-family:monospace;font-size:.75rem">${ot.numero}</td>
      <td style="font-weight:600">${ot.estacion}</td>
      <td>${getContratista(ot.contratistaId)?.nombre||'—'}</td>
      <td><div style="background:#e2e8f0;border-radius:4px;height:8px;width:100%;overflow:hidden"><div style="width:${calcProgress(ot)}%;height:100%;background:linear-gradient(90deg,#00E5C3,#FF7240);"></div></div><span style="font-size:.7rem;font-weight:700">${calcProgress(ot)}%</span></td>
      <td><span style="background:${estInfo.c}22;color:${estInfo.c};padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:700">${estInfo.l}</span></td>
      <td><span class="${bc}">${sem.icon} ${sem.label}</span></td>
      <td style="font-size:.75rem">${ot.fechaCompromiso?fmtDate(ot.fechaCompromiso):'—'}</td>
      <td style="font-size:.72rem;color:#4a6278;font-style:italic;max-width:200px">${ultimaNota?`📝 ${ultimaNota.accion} <span style="opacity:.6">(${fmtDate(ultimaNota.fecha)})</span>`:''}</td>
    </tr>`;
  }).join('');

  const htmlContent=`<!DOCTYPE html>

function filtrarMes(mesKey){
  // Sync the top controls filter
  document.getElementById('mesFilter').value=mesKey;
